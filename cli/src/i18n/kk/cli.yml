dev: Әзірлеу және жөндеу серверін бастаңыз
new: Жаңа компонент
npm: dist/npm бумасын құрастырыңыз
npmPublish: npm бумасын жариялау
npmRelease: Ағымдағы тармақты босату тармағына итеріңіз (github әрекетін шығару процесін іске қосыңыз)
readme: README.md түбірлік каталогын жасаңыз және басында көп тілді шарлауды қосыңыз
redirect2html: _redirects негізінде беттерді көшіріңіз
site: Бөлімге/сайтқа статикалық сайтты алдын ала қарауды құрастырыңыз
dist: Статикалық сайтты жасаңыз және оны дист/дистанцияға жариялаңыз
siteSrv: Статикалық торапты алдын ала қарауды жасаңыз және алдын ала қарау серверін іске қосыңыз
distSrv: Жариялауға арналған статикалық сайтты жасаңыз және алдын ала қарау серверін іске қосыңыз
jsDoc: src/js құжаттарын тексеріңіз және құжатты автоматты түрде толтыруды жүзеге асыру үшін жасанды интеллектпен ынтымақтасыңыз
tran: аудару