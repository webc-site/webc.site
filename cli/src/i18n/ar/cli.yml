dev: بدء تشغيل خادم التطوير والتصحيح
new: مكون جديد
npm: قم ببناء الحزمة dist/npm
npmPublish: نشر حزمة npm
npmRelease: ادفع الفرع الحالي إلى فرع الإصدار (قم بتشغيل عملية إصدار إجراء github)
readme: قم بإنشاء الدليل الجذر README.md وأضف التنقل متعدد اللغات في البداية
redirect2html: انسخ الصفحات بناءً على عمليات إعادة التوجيه
site: قم بإنشاء معاينة موقع ثابتة لـ dist/site
dist: أنشئ موقعًا ثابتًا وانشره على dist/dist
siteSrv: أنشئ معاينة ثابتة للموقع وابدأ تشغيل خادم المعاينة
distSrv: أنشئ موقعًا ثابتًا للنشر وابدأ تشغيل خادم المعاينة
jsDoc: تحقق من مستندات src/js وتعاون مع الذكاء الاصطناعي لتحقيق الإكمال التلقائي للمستندات
tran: يترجم