dev: سرور توسعه و رفع اشکال را شروع کنید
new: جزء جدید
npm: بسته dist/npm را بسازید
npmPublish: بسته npm را منتشر کنید
npmRelease: شاخه فعلی را به شاخه انتشار فشار دهید (فرآیند انتشار اکشن github را راه اندازی کنید)
readme: دایرکتوری ریشه README.md را ایجاد کنید و در ابتدا پیمایش چند زبانه را اضافه کنید
redirect2html: صفحات را بر اساس _redirects کپی کنید
site: پیش نمایش سایت ایستا را در dist/site بسازید
dist: یک سایت ثابت بسازید و آن را در dist/dist منتشر کنید
siteSrv: یک پیش نمایش سایت ثابت بسازید و سرور پیش نمایش را راه اندازی کنید
distSrv: یک سایت ثابت برای انتشار بسازید و سرور پیش نمایش را راه اندازی کنید
jsDoc: اسناد src/js را تأیید کنید و با هوش مصنوعی برای تکمیل خودکار اسناد همکاری کنید
tran: ترجمه کنید