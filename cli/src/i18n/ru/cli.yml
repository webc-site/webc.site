dev: Запустите сервер разработки и отладки.
new: Новый компонент
npm: Создайте пакет dist/npm.
npmPublish: Опубликовать пакет npm
npmRelease: Отправьте текущую ветку в ветку выпуска (запустите процесс выпуска действия github)
readme: Создайте корневой каталог README.md и добавьте многоязычную навигацию в начале.
redirect2html: Копирование страниц на основе _redirects
site: Создайте предварительный просмотр статического сайта в dist/site.
dist: Создайте статический сайт и опубликуйте его на dist/dist.
siteSrv: Создайте статический предварительный просмотр сайта и запустите сервер предварительного просмотра.
distSrv: Создайте статический сайт для публикации и запустите сервер предварительного просмотра.
jsDoc: Проверяйте документы src/js и сотрудничайте с искусственным интеллектом для автоматического заполнения документов.
tran: переводить