dev: Запусціце сервер распрацоўкі і адладкі
new: Новы кампанент
npm: Стварыце пакет dist/npm
npmPublish: Апублікаваць пакет npm
npmRelease: Перамясціць бягучую галінку ў галінку выпуску (запусціць працэс выпуску дзеяння github)
