dev: ڈویلپمنٹ اور ڈیبگنگ سرور شروع کریں۔
new: نیا جزو
npm: dist/npm پیکیج بنائیں
npmPublish: این پی ایم پیکیج شائع کریں۔
npmRelease: موجودہ برانچ کو ریلیز برانچ کی طرف دھکیلیں (گیتھب ایکشن ریلیز کے عمل کو متحرک کریں)
readme: روٹ ڈائرکٹری README.md بنائیں اور شروع میں ملٹی لینگویج نیویگیشن شامل کریں۔
redirect2html: _redirects کی بنیاد پر صفحات کاپی کریں۔
site: ڈسٹ/سائٹ پر جامد سائٹ کا پیش نظارہ بنائیں
dist: ایک مستحکم سائٹ بنائیں اور اسے dist/dist میں شائع کریں۔
siteSrv: ایک جامد سائٹ کا پیش نظارہ بنائیں اور پیش نظارہ سرور شروع کریں۔
distSrv: اشاعت کے لیے ایک جامد سائٹ بنائیں اور پیش نظارہ سرور شروع کریں۔
jsDoc: src/js دستاویزات کی تصدیق کریں اور خودکار دستاویز کی تکمیل کو محسوس کرنے کے لیے مصنوعی ذہانت کے ساتھ تعاون کریں
tran: ترجمہ