npmRelease: Pastumkite dabartinę šaką į išleidimo šaką (suaktyvinkite „Github“ veiksmo išleidimo procesą)
readme: Sugeneruokite šakninį katalogą README.md ir pradžioje pridėkite kelių kalbų naršymą
