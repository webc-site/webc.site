distSrv: Sukurkite statinę svetainę publikavimui ir paleiskite peržiūros serverį
jsDoc: Patikrinkite src/js dokumentus ir bendradarbiaukite su dirbtiniu intelektu, kad įgyvendintumėte automatinį dokumentų užbaigimą
