dev: ဖွံ့ဖြိုးတိုးတက်မှုနှင့် အမှားရှာပြင်ဆာဗာကို စတင်ပါ။
new: အစိတ်အပိုင်းအသစ်
npm: dist/npm အထုပ်ကိုတည်ဆောက်ပါ။
npmPublish: npm ပက်ကေ့ဂျ်ထုတ်ဝေပါ။
npmRelease: လက်ရှိဌာနခွဲကို ထုတ်ဝေမှုဌာနခွဲသို့ တွန်းပို့ပါ (github လုပ်ဆောင်ချက် ဖြန့်ချိမှုလုပ်ငန်းစဉ်ကို အစပျိုးရန်)
readme: အမြစ်လမ်းညွှန် README.md ကို ဖန်တီးပြီး အစတွင် ဘာသာစကားပေါင်းစုံ လမ်းညွှန်ချက်ထည့်ပါ။
redirect2html: _redirects များကို အခြေခံ၍ စာမျက်နှာများကို ကူးယူပါ။
site: dist/site အတွက် static site preview ကိုတည်ဆောက်ပါ။
dist: တည်ငြိမ်သောဆိုက်တစ်ခုကို တည်ဆောက်ပြီး ၎င်းကို dist/dist လုပ်ရန် ထုတ်ဝေပါ။
siteSrv: အငြိမ်ဆိုက်အကြိုကြည့်ရှုခြင်းကို တည်ဆောက်ပြီး အကြိုကြည့်ရှုသည့်ဆာဗာကို စတင်ပါ။
distSrv: ထုတ်ဝေမှုအတွက် အငြိမ်ဆိုက်တစ်ခုကို တည်ဆောက်ပြီး အကြိုကြည့်ရှုသည့်ဆာဗာကို စတင်ပါ။
jsDoc: src/js စာရွက်စာတမ်းများကို စစ်ဆေးအတည်ပြုပြီး အလိုအလျောက်စာရွက်စာတမ်းပြီးစီးမှုကို သိရှိနိုင်ရန် ဥာဏ်ရည်တုနှင့် ပူးပေါင်းဆောင်ရွက်ပါ။
tran: ဘာသာပြန်ပါ။