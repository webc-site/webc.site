dev: 開発およびデバッグサーバーを起動します
new: 新しいコンポーネント
npm: dist/npm パッケージをビルドする
npmPublish: npmパッケージを公開する
npmRelease: 現在のブランチをリリース ブランチにプッシュします (github アクションのリリース プロセスをトリガーします)。
readme: ルート ディレクトリ README.md を生成し、先頭に多言語ナビゲーションを追加します。
redirect2html: _redirects に基づいてページをコピーする
site: 静的サイトのプレビューを dist/site に構築する
dist: 静的サイトを構築して dist/dist に公開する
siteSrv: 静的サイトのプレビューを構築し、プレビュー サーバーを起動する
distSrv: 公開用の静的サイトを構築し、プレビュー サーバーを起動する
jsDoc: src/jsドキュメントを検証し、人工知能と連携してドキュメントの自動補完を実現
tran: 翻訳する