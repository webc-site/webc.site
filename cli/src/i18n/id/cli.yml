dev: Mulai server pengembangan dan debugging
new: Komponen baru
npm: Bangun paket dist/npm
npmPublish: Publikasikan paket npm
npmRelease: Dorong cabang saat ini ke cabang rilis (memicu proses rilis tindakan github)
readme: Hasilkan direktori root README.md dan tambahkan navigasi multi-bahasa di awal
redirect2html: Salin halaman berdasarkan _redirects
site: Buat pratinjau situs statis ke dist/situs
