distSrv: Bangun situs statis untuk publikasi dan mulai server pratinjau
jsDoc: Verifikasi dokumen src/js dan bekerja sama dengan kecerdasan buatan untuk mewujudkan penyelesaian dokumen otomatis
tran: menerjemahkan