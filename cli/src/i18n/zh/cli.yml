dev: 启动开发调试服务器
new: 新建组件
npm: 构建 dist/npm 包
npmPublish: 发布npm包
npmRelease: 推送当前分支到 release 分支（触发 github action 发布流程）
readme: 生成根目录 README.md ，开头添加多语言导航
redirect2html: 根据 _redirects 复制页面
site: 构建静态站点预览到 dist/site
dist: 构建静态站点发布到 dist/dist
siteSrv: 构建静态站点预览 ，并启动预览服务器
distSrv: 构建静态站点发布，并启动预览服务器
jsDoc: 校验 src/js 的文档，配合人工智能实现文档自动补全
tran: 翻译
