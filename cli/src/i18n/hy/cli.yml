dev: Սկսեք մշակման և վրիպազերծման սերվերը
new: Նոր բաղադրիչ
npm: Կառուցեք dist/npm փաթեթը
npmPublish: Հրապարակեք npm փաթեթը
npmRelease: Հրել ընթացիկ ճյուղը դեպի թողարկման ճյուղ (գործարկեք github գործողության թողարկման գործընթացը)
readme: Ստեղծեք README.md արմատային գրացուցակը և սկզբում ավելացրեք բազմալեզու նավարկություն
redirect2html: Պատճենել էջերը՝ հիմնված _վերահղումների վրա
site: Կառուցեք ստատիկ կայքի նախադիտում դեպի հեռավոր/կայք
dist: Կառուցեք ստատիկ կայք և հրապարակեք այն dist/dist-ում
siteSrv: Կառուցեք կայքի ստատիկ նախադիտում և գործարկեք նախադիտման սերվերը
distSrv: Ստեղծեք ստատիկ կայք հրապարակման համար և գործարկեք նախադիտման սերվերը
jsDoc: Ստուգեք src/js փաստաթղթերը և համագործակցեք արհեստական ​​ինտելեկտի հետ՝ փաստաթղթերի ավտոմատ լրացումն իրականացնելու համար
tran: թարգմանել