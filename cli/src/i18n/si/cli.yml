dev: සංවර්ධන සහ නිදොස් කිරීමේ සේවාදායකය ආරම්භ කරන්න
new: නව සංරචකය
npm: dist/npm පැකේජය සාදන්න
npmPublish: npm පැකේජය ප්‍රකාශ කරන්න
npmRelease: වත්මන් ශාඛාව මුදා හැරීමේ ශාඛාව වෙත තල්ලු කරන්න (ගිතුබ් ක්‍රියා මුදා හැරීමේ ක්‍රියාවලිය අවුලුවන්න)
readme: මූල නාමාවලිය README.md ජනනය කර ආරම්භයේදී බහු භාෂා සංචාලනය එක් කරන්න
redirect2html: _redirects මත පදනම්ව පිටු පිටපත් කරන්න
site: ස්ථිතික අඩවි පෙරදසුන dist/site වෙත සාදන්න
dist: ස්ථිතික අඩවියක් ගොඩනඟා එය dist/dist වෙත ප්‍රකාශ කරන්න
siteSrv: ස්ථිතික අඩවි පෙරදසුනක් ගොඩනඟා පෙරදසුන් සේවාදායකය ආරම්භ කරන්න
distSrv: ප්‍රකාශනය සඳහා ස්ථිතික අඩවියක් ගොඩනඟා පෙරදසුන් සේවාදායකය ආරම්භ කරන්න
jsDoc: ස්වයංක්‍රීය ලේඛන සම්පූර්ණ කිරීම සාක්ෂාත් කර ගැනීම සඳහා src/js ලේඛන සත්‍යාපනය කර කෘතිම බුද්ධිය සමඟ සහයෝගයෙන් කටයුතු කරන්න
tran: පරිවර්තනය කරන්න