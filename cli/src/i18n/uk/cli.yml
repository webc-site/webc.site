dev: Запустіть сервер розробки та налагодження
new: Новий компонент
npm: Створіть пакет dist/npm
npmPublish: Опублікувати пакет npm
npmRelease: Перемістити поточну гілку до гілки випуску (ініціювати процес випуску дії github)
readme: Створіть кореневий каталог README.md і додайте багатомовну навігацію на початку
redirect2html: Копіювати сторінки на основі _перенаправлень
site: Створення попереднього перегляду статичного сайту на dist/site
dist: Створіть статичний сайт і опублікуйте його на dist/dist
siteSrv: Створіть статичний попередній перегляд сайту та запустіть сервер попереднього перегляду
distSrv: Створіть статичний сайт для публікації та запустіть сервер попереднього перегляду
jsDoc: Перевірте документи src/js і співпрацюйте зі штучним інтелектом, щоб реалізувати автоматичне заповнення документів
tran: перекладати