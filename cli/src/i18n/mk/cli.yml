dev: Започнете го серверот за развој и дебагирање
new: Нова компонента
npm: Изградете го пакетот dist/npm
npmPublish: Објавете го пакетот npm
npmRelease: Притиснете ја тековната гранка до гранката за ослободување (активирајте го процесот на ослободување на акцијата на github)
readme: Генерирајте root директориум README.md и додадете повеќејазична навигација на почетокот
redirect2html: Копирајте страници врз основа на _пренасочувања
site: Изградете статичен преглед на страницата до dist/site
dist: Изградете статична локација и објавете ја на dist/dist
siteSrv: Направете статичен преглед на страницата и стартувајте го серверот за преглед
distSrv: Изградете статична локација за објавување и стартувајте го серверот за преглед
jsDoc: Потврдете src/js документи и соработувајте со вештачката интелигенција за да го реализирате автоматското пополнување на документите
