- id: 20026
  md: |
    ## 使用

    为元素添加类名：

    ```html
    <!-- 普通按钮 -->
    <button class="Btn">确认</button>

    <!-- 主要高亮 -->
    <button class="Btn Main">提交</button>

    <!-- 链接按钮 -->
    <a class="Btn" href="https://github.com">链接按钮</a>

    <!-- 图标按钮 -->
    <button class="BtnC"><i class="Ico"></i></button>
    ```

    ## 图标样式

    可通过 `background-image` 自定义 `BtnC` 的图标：

    ```html
    <style>
    .BtnC.add . Ico {
      background-image: var(--btnSvgAdd);
    }
    </style>
    <button class="BtnC add"><i class="Ico"></i></button>
    ```

    行内代码对 `<` 和 `>` 转义，如 `<a>` 和 `<b>`。
  htm: |
    <h2>使用</h2>
    <p>为元素添加类名：</p>
    <pre><code class="language-html">&#60;!-- 普通按钮 --&#62;
    &#60;button class=&#34;Btn&#34;&#62;确认&#60;/button&#62;

    &#60;!-- 主要高亮 --&#62;
    &#60;button class=&#34;Btn Main&#34;&#62;提交&#60;/button&#62;

    &#60;!-- 链接按钮 --&#62;
    &#60;a class=&#34;Btn&#34; href=&#34;https://github.com&#34;&#62;链接按钮&#60;/a&#62;

    &#60;!-- 图标按钮 --&#62;
    &#60;button class=&#34;BtnC&#34;&#62;&#60;i class=&#34;Ico&#34;&#62;&#60;/i&#62;&#60;/button&#62;</code></pre>
    <h2>图标样式</h2>
    <p>可通过 <code>background-image</code> 自定义 <code>BtnC</code> 的图标：</p>
    <pre><code class="language-html">&#60;style&#62;
    .BtnC.add . Ico {
      background-image: var(--btnSvgAdd);
    }
    &#60;/style&#62;
    &#60;button class=&#34;BtnC add&#34;&#62;&#60;i class=&#34;Ico&#34;&#62;&#60;/i&#62;&#60;/button&#62;</code></pre>
    <p>行内代码对 <code>&#60;</code> 和 <code>&#62;</code> 转义，如 <code>&#60;a&#62;</code> 和 <code>&#60;b&#62;</code>。</p>
  desc: code_html_escaping

