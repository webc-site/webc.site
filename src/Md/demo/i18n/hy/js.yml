mdContent: |
  # Markdown ներկայացման փաստաթուղթ
  Սա **ստատիկ մատուցման** ցուցադրություն է:
  ## Հիմնական ոճ
  - **Թավ** և *շեղ*
  - ~~strikethrough~~
  - `inline_code` ներկառուցված կոդը
  - [Միավորված ազգերի կազմակերպության պաշտոնական կայք](https://un.org) Հղման ցուցադրություն
  ## Մեջբերումներ և ցուցակներ
  > Սա մեկ տողով մեջբերում է:

  > Սա բազմատող մեջբերում է։
  > Տեսողական էֆեկտ՝ բազմակողմանի հղումներ ցուցադրելու համար:

  - Չպատվիրված առաջին տարր
    - Չպատվիրված ենթակետ առաջին
    - Չպատվիրված ենթակետ երկու
  - Չպատվիրված երկրորդ ապրանք

  > [!NOTE]
  > `> [!NOTE]` Ընդհանուր հաղորդագրություններ և նշումներ

  > [!TIP]
  > `> [!TIP]` Խորհուրդներ և օգտակար խորհուրդներ

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Կարևոր խորհուրդներ և մտահոգություններ

  > [!WARNING]
  > `> [!WARNING]` Ռիսկի նախազգուշացումներ և նշումներ

  > [!CAUTION]
  > `> [!CAUTION]` ՎՏԱՆԳԻ ԵՎ Ծայրահեղ ՌԻՍԿԻ ԶԳՈՒՇԱՑՈՒՄ

  ---

  ## առաջադրանքների ցանկը
  - [ ] Սա առաջադրանքների անավարտ ցանկն է
  - [x] Սա ավարտված ցուցակի առաջադրանք է
  - [X] Սա ավարտված ցուցակի առաջադրանք է (մեծատառ X)

  ---

  1. Պատվիրել է առաջին ապրանքը
     1. Պատվիրել է առաջին ապրանքը
     2. Պատվիրված ենթակետ երկու
  2. Պատվիրել է երկրորդ ժամկետը
  ## թերթիկ
  | նախագիծը | պետություն | միավոր |
  | :--- | :---: | ---: |
  | ստատիկ | Ավարտված | 100 |
  | հոսքային | Ներկայացում | 95 |
  ## կոդի բլոկ
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## նկար
  ![Դեմո նկար](https://i-01.eu.org/demo-green.avif)