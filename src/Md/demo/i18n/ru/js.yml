mdContent: |
  # Презентационный документ Markdown
  Это демонстрация **статического рендеринга**.
  ## Базовый стиль
  - **Жирный** и *Курсив*
  - ~~зачеркивание~~
  - `inline_code` встроенный код
  - [Официальный сайт Организации Объединенных Наций](https://un.org) Демонстрация ссылки
  ## Цитаты и списки
  > Это однострочная цитата.

  > Это многострочная цитата.
  > Визуальный эффект для отображения многострочных ссылок.

  - Неупорядоченный первый элемент
    - Неупорядоченный подпункт первый
    - Неупорядоченный подпункт второй
  - Неупорядоченный второй элемент

  > [!NOTE]
  > `> [!NOTE]` Общие сообщения и примечания

  > [!TIP]
  > `> [!TIP]` Советы и полезные советы

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Важные советы и замечания

  > [!WARNING]
  > `> [!WARNING]` Предупреждения и примечания о рисках

  > [!CAUTION]
  > `> [!CAUTION]` ПРЕДУПРЕЖДЕНИЕ ОБ ОПАСНОСТИ И ЧРЕЗВЫЧАЙНОМ РИСКАХ

  ---

  ## список задач
  - [ ] Это незаконченный список задач
  - [x] Это выполненное задание по списку
  - [X] Это выполненное задание по списку (заглавная X)

  ---

  1. Заказал первый товар
     1. Заказал товар первый
     2. Заказал второй подпункт
  2. Заказал второй срок
