mdContent: |
  # Dokument prezentacyjny Markdown
  To jest demonstracja **renderowania statycznego**.
  ## Podstawowy styl
  - **Pogrubienie** i *Kursywa*
  - ~~przekreślenie~~
  - `inline_code` kod wbudowany
  - [Oficjalna strona Organizacji Narodów Zjednoczonych](https://un.org) Link do demonstracji
  ## Cytaty i listy
  > To jest cytat z jednej linijki.

  > To jest cytat wielowierszowy.
  > Efekt wizualny do wyświetlania odniesień wielowierszowych.

  - Nieuporządkowany pierwszy przedmiot
    - Nieuporządkowany podpunkt pierwszy
    - Nieuporządkowany podpunkt drugi
  - Nieuporządkowany drugi przedmiot

  > [!NOTE]
  > `> [!NOTE]` Wiadomości ogólne i notatki

  > [!TIP]
  > `> [!TIP]` Wskazówki i pomocne wskazówki

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Ważne wskazówki i wątpliwości

  > [!WARNING]
  > `> [!WARNING]` Ostrzeżenia i uwagi dotyczące ryzyka

  > [!CAUTION]
  > `> [!CAUTION]` NIEBEZPIECZEŃSTWO I EKSTRA RYZYKO OSTRZEŻENIE

  ---

  ## lista zadań
  - [ ] To jest niedokończona lista zadań
  - [x] To jest ukończone zadanie listowe
  - [X] To jest ukończone zadanie listowe (duże X)

  ---

  1. Zamówiłem pierwszą rzecz
     1. Zamówiony przedmiot numer jeden
     2. Zamówiłem podpunkt drugi
  2. Zamówiony drugi termin
  ## arkusz
  | projekt | państwo | wynik |
  | :--- | :---: | ---: |
  | statyczny | Zakończony | 100 |
  | przesyłanie strumieniowe | Wykonanie | 95 |
  ## blok kodu
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
