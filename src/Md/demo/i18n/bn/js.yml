mdContent: |
  # মার্কডাউন উপস্থাপনা নথি
  এটি একটি **স্ট্যাটিক রেন্ডারিং** প্রদর্শন।
  ## মৌলিক শৈলী
  - **বোল্ড** এবং *ইটালিক*
  - ~~স্ট্রাইকথ্রু~~
  - `inline_code` ইনলাইন কোড
  - [জাতিসংঘের অফিসিয়াল ওয়েবসাইট](https://un.org) লিঙ্ক প্রদর্শন
  ## উদ্ধৃতি এবং তালিকা
  > এটি একটি একক লাইনের উদ্ধৃতি।

  > এটি একটি বহু-লাইন উদ্ধৃতি।
  > মাল্টি-লাইন রেফারেন্স প্রদর্শনের জন্য একটি ভিজ্যুয়াল এফেক্ট।

  - প্রথম আইটেম অবিন্যস্ত
    - অননুযায়ী সাবআইটেম এক
    - অপরিবর্তিত সাবআইটেম দুই
  - অপরিবর্তিত দ্বিতীয় আইটেম

  > [!NOTE]
  > `> [!NOTE]` সাধারণ বার্তা এবং নোট

  > [!TIP]
  > `> [!TIP]` টিপস এবং সহায়ক টিপস

  > [!IMPORTANT]
  > `> [!IMPORTANT]` গুরুত্বপূর্ণ টিপস এবং উদ্বেগ

  > [!WARNING]
  > `> [!WARNING]` ঝুঁকি সতর্কতা এবং নোট

  > [!CAUTION]
  > `> [!CAUTION]` বিপদ এবং চরম ঝুঁকির সতর্কতা

  ---

  ## কাজের তালিকা
  - [ ] এটি একটি অসমাপ্ত কাজের তালিকা
  - [x] এটি একটি সম্পূর্ণ তালিকা কাজ
  - [X] এটি একটি সম্পূর্ণ তালিকার কাজ (ক্যাপিটাল এক্স)

  ---

  1. প্রথম আইটেম অর্ডার
     1. অর্ডার আইটেম এক
     2. সাবটিম দুই আদেশ
  2. দ্বিতীয় মেয়াদের আদেশ দিয়েছেন
  ## শীট
  | প্রকল্প | রাষ্ট্র | স্কোর |
  | :--- | :---: | ---: |
  | স্থির | সম্পন্ন | 100 |
  | স্ট্রিমিং | রেন্ডারিং | 95 |
  ## কোড ব্লক
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
