mdContent: |
  # مارک ڈاؤن پریزنٹیشن دستاویز
  یہ ایک **سٹیٹک رینڈرنگ** کا مظاہرہ ہے۔
  ## بنیادی انداز
  - **بولڈ** اور *اٹالک*
  - ~~ ہڑتال~~
  - `inline_code` ان لائن کوڈ
  - [اقوام متحدہ کی سرکاری ویب سائٹ](https://un.org) لنک کا مظاہرہ
  ## اقتباسات اور فہرستیں۔
  > یہ ایک سطری اقتباس ہے۔

  > یہ ایک کثیر سطری اقتباس ہے۔
  > ملٹی لائن حوالہ جات کو ظاہر کرنے کے لیے ایک بصری اثر۔

  - غیر ترتیب شدہ پہلی چیز
    - غیر ترتیب شدہ سب آئٹم ایک
    - غیر ترتیب شدہ سب آئٹم دو
  - غیر ترتیب شدہ دوسری آئٹم

  > [!NOTE]
  > `> [!NOTE]` عام پیغامات اور نوٹس

  > [!TIP]
  > `> [!TIP]` ٹپس اور مددگار ٹپس

  > [!IMPORTANT]
  > `> [!IMPORTANT]` اہم تجاویز اور خدشات

  > [!WARNING]
  > `> [!WARNING]` خطرے سے متعلق انتباہات اور نوٹس

  > [!CAUTION]
  > `> [!CAUTION]` خطرہ اور انتہائی خطرے کی وارننگ

  ---

  ## کام کی فہرست
  - [ ] یہ کاموں کی ایک نامکمل فہرست ہے۔
  - [x] یہ ایک مکمل فہرست کا کام ہے۔
  - [X] یہ ایک مکمل فہرست کا کام ہے (کیپٹل ایکس)

  ---

  1. پہلی چیز کا آرڈر دیا گیا۔
     1. آرڈر شدہ آئٹم ایک
     2. حکم دیا subitem دو
  2. دوسری مدت کا حکم دیا۔
  ## شیٹ
  | پروجیکٹ | ریاست | سکور |
  | :--- | :---: | ---: |
  | جامد | مکمل | 100 |
  | سلسلہ بندی | رینڈرنگ | 95 |
  ## کوڈ بلاک
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
