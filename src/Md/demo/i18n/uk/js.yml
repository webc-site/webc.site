mdContent: |
  # Документ презентації Markdown
  Це демонстрація **статичного відтворення**.
  ## Основний стиль
  - **Жирний шрифт** і *Курсив*
  - ~~закреслене~~
  - `inline_code` вбудований код
  - [Офіційний веб-сайт ООН](https://un.org) Демонстрація посилання
  ## Цитати та списки
  > Це однорядкова цитата.

  > Це багаторядкова цитата.
  > Візуальний ефект для відображення багаторядкових посилань.

  - Невпорядкований перший предмет
    - Невпорядкований підпункт перший
    - Невпорядкований підпункт другий
  - Другий предмет без замовлення

  > [!NOTE]
  > `> [!NOTE]` Загальні повідомлення та примітки

  > [!TIP]
  > `> [!TIP]` Поради та корисні поради

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Важливі поради та зауваження

  > [!WARNING]
  > `> [!WARNING]` Попередження та примітки про ризики

  > [!CAUTION]
  > `> [!CAUTION]` ПОПЕРЕДЖЕННЯ ПРО НЕБЕЗПЕКУ ТА НАДЗВИЧАЛЬНИЙ РИЗИК

  ---

  ## список завдань
  - [ ] Це незавершений список завдань
  - [x] Це завершене завдання списку
  - [X] Це виконане завдання списку (велика X)

  ---

  1. Замовив перший товар
     1. Замовив товар один
     2. Замовив підпункт другий
  2. Замовив другий термін
  ## лист
  | демонструвати | стан | рахунок |
  | :--- | :---: | ---: |
  | статичний | Виконано | 100 |
  | потокове передавання | Візуалізація | 95 |
  ## блок коду
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## малюнок
