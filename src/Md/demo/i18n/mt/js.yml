mdContent: |
  # Dokument tal-preżentazzjoni tal-markdown
  Din hija dimostrazzjoni ta' ** rendering statiku **.
  ## Stil bażiku
  - **Grassett** u *Korsiv*
  - ~~strikethrough~~
  - `inline_code` kodiċi inline
  - [Websajt uffiċjali tan-Nazzjonijiet Uniti](https://un.org) Dimostrazzjoni tal-link
  ## Kwotazzjonijiet u Listi
  > Din hija kwotazzjoni ta 'linja waħda.

  > Din hija kwotazzjoni b'ħafna linji.
  > Effett viżwali għall-wiri ta 'referenzi b'ħafna linji.

  - L-ewwel oġġett mhux ordnat
    - Suboġġett wieħed mhux ordnat
    - Subitem tnejn mhux ordnat
  - It-tieni oġġett mhux ordnat

  > [!NOTE]
  > `> [!NOTE]` Messaġġi u noti ġenerali

  > [!TIP]
  > `> [!TIP]` Suġġerimenti u pariri ta' għajnuna

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Suġġerimenti u tħassib importanti

  > [!WARNING]
  > `> [!WARNING]` Twissijiet u Noti dwar Riskju

  > [!CAUTION]
  > `> [!CAUTION]` TWISSIJA TA' PERIKOLU U RISKJU ESTREM

  ---

  ## lista tal-kompiti
  - [ ] Din hija lista mhux mitmuma ta' kompiti
  - [x] Dan huwa kompitu ta 'lista kompluta
  - [X] Dan huwa kompitu ta' lista kompluta (kapital X)

  ---

  1. Ordnat l-ewwel oġġett
     1. Oġġett ordnat wieħed
     2. Ordnat is-subpunt tnejn
  2. Ordnat it-tieni terminu
  ## folja
  | proġett | istat | punteġġ |
  | :--- | :---: | ---: |
  | statiku | Imlesta | 100 |
  | streaming | Rendering | 95 |
  ## blokk tal-kodiċi
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
