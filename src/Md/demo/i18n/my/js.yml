mdContent: |
  # Markdown တင်ပြချက်စာတမ်း
  ၎င်းသည် **တည်ငြိမ်သော ပုံဖေါ်ခြင်း** သရုပ်ပြမှုဖြစ်သည်။
  ## အခြေခံစတိုင်
  - **ရဲရင့်** နှင့် *အီတလစ်*
  - ~~ ထိုးဖောက် ~~
  - `inline_code` လိုင်းကုဒ်
  - [ကုလသမဂ္ဂတရားဝင် ဝဘ်ဆိုဒ်](https://un.org) သရုပ်ပြခြင်းလင့်ခ်
  ## ကိုးကားချက်စာရင်းများ
  > ဤသည်မှာ တစ်ကြောင်းတည်းသော ကိုးကားချက်ဖြစ်သည်။

  > ဤသည်မှာ စာကြောင်းပေါင်းများစွာ ကိုးကားချက်ဖြစ်သည်။
  > လိုင်းပေါင်းစုံ အကိုးအကားများကို ပြသရန်အတွက် အမြင်အာရုံအကျိုးသက်ရောက်မှု။

  - မှာယူထားသော ပထမပစ္စည်း
    - အစီအစဥ်မတင်ရသေးသော အကြောင်းအရာတစ်ခု
    - အစီအစဥ်မရှိသော အကြောင်းအရာနှစ်ခု
  - မှာယူထားသော ဒုတိယပစ္စည်း

  > [!NOTE]
  > `> [!NOTE]` အထွေထွေမက်ဆေ့ချ်များနှင့် မှတ်စုများ

  > [!TIP]
  > `> [!TIP]` အကြံပြုချက်များနှင့် အထောက်အကူဖြစ်စေသော အကြံပြုချက်များ

  > [!IMPORTANT]
  > `> [!IMPORTANT]` အရေးကြီးသော အကြံပြုချက်များနှင့် စိုးရိမ်ပူပန်မှုများ

  > [!WARNING]
  > `> [!WARNING]`အန္တရာယ်သတိပေးချက်များနှင့် မှတ်စုများ

  > [!CAUTION]
  > `> [!CAUTION]`အန္တရာယ်နှင့် ပြင်းထန်သောအန္တရာယ် သတိပေးချက်

  ---

  ## အလုပ်စာရင်း
  - [ ] ဤသည်မှာ မပြီးပြတ်သေးသော အလုပ်များစာရင်းဖြစ်သည်။
  - [x] ဤသည်မှာ ပြီးမြောက်သော စာရင်းအလုပ်ဖြစ်သည်။
  - [X] ၎င်းသည် ပြီးမြောက်သော စာရင်းအလုပ် (အရင်း X)

  ---

  1. ပထမပစ္စည်းကို မှာကြားခဲ့သည်။
     1. ပစ္စည်းတစ်ခုကို မှာထားတာ
     2. စာတမ်းနှစ်စောင်ကို မှာယူခဲ့သည်။
  2. ဒုတိယအကြိမ်မြောက် အမိန့်ထုတ်သည်။
  ## စာရွက်
  | စီမံကိန်း | ပြည်နယ် | နိုင်ပြီ |
  | :--- | :---: | ---: |
  | အငြိမ် | ပြီးသွားပြီ | 100 |
  | streaming | ပုံဖေါ်ခြင်း။ | 95 |
  ## ကုဒ်တုံး
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## ပုံ
