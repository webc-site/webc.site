mdContent: |
  # מסמך מצגת Markdown
  זוהי הדגמה של **עיבוד סטטי**.
  ## סגנון בסיסי
  - **מודגש** ו*נטה*
  - ~~מחצה~~
  - `inline_code` קוד מוטבע
  - [האתר הרשמי של האומות המאוחדות](https://un.org) הפגנת קישור
  ## ציטוטים ורשימות
  > זהו ציטוט בשורה אחת.

  > זהו ציטוט רב שורות.
  > אפקט חזותי להצגת הפניות מרובות שורות.

  - פריט ראשון שלא הוזמן
    - תת פריט ראשון לא מסודר
    - סעיף משנה שני לא מסודר
  - פריט שני לא מסומן

  > [!NOTE]
  > `> [!NOTE]` הודעות והערות כלליות

  > [!TIP]
  > `> [!TIP]` טיפים וטיפים מועילים

  > [!IMPORTANT]
  > `> [!IMPORTANT]` טיפים וחששות חשובים

  > [!WARNING]
  > `> [!WARNING]` אזהרות והערות סיכון

  > [!CAUTION]
  > `> [!CAUTION]` אזהרת סכנה וסיכון קיצוני

  ---

  ## רשימת משימות
  - [ ] זוהי רשימה לא גמורה של משימות
  - [x] זוהי משימת רשימה שהושלמה
  - [X] זוהי משימת רשימה שהושלמה (X רישיות)

