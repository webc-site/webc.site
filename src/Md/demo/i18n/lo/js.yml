mdContent: |
  # ເອກະສານການນໍາສະເຫນີ Markdown
  ນີ້ແມ່ນການສາທິດ **ການສະແດງຜົນແບບຄົງທີ່**.
  ## ແບບພື້ນຖານ
  - **ຕົວໜາ** ແລະ *ຕົວອຽງ*
  - ~~ຕີຜ່ານ~~
  - `inline_code` ລະຫັດໃນແຖວ
  - [ເວັບໄຊທ໌ທາງການຂອງສະຫະປະຊາຊາດ](https://un.org) ການສາທິດການເຊື່ອມຕໍ່
  ## ວົງຢືມແລະລາຍຊື່
  > ນີ້ແມ່ນ ຄຳ ເວົ້າເສັ້ນດຽວ.

  > ນີ້ແມ່ນຄໍາເວົ້າຫຼາຍແຖວ.
  > ເອັບເຟັກສາຍຕາເພື່ອສະແດງການອ້າງອີງຫຼາຍແຖວ.

  - ລາຍການທຳອິດທີ່ບໍ່ໄດ້ສັ່ງ
    - ລາຍການຍ່ອຍທີ່ບໍ່ໄດ້ຈັດຮຽງລຳດັບໜຶ່ງ
    - ລາຍການຍ່ອຍທີ່ບໍ່ໄດ້ລຳດັບສອງ
  - ບໍ່ໄດ້ສັ່ງລາຍການທີສອງ

  > [!NOTE]
  > `> [!NOTE]` ຂໍ້ຄວາມ ແລະບັນທຶກທົ່ວໄປ

  > [!TIP]
  > `> [!TIP]`ຄໍາແນະນໍາ ແລະຄໍາແນະນໍາທີ່ເປັນປະໂຫຍດ

  > [!IMPORTANT]
  > `> [!IMPORTANT]`ຄໍາແນະນໍາ ແລະຄວາມກັງວົນທີ່ສໍາຄັນ

  > [!WARNING]
  > `> [!WARNING]` ຄຳເຕືອນຄວາມສ່ຽງ ແລະໝາຍເຫດ

  > [!CAUTION]
  > `> [!CAUTION]` ຄຳເຕືອນກ່ຽວກັບອັນຕະລາຍ ແລະຄວາມສ່ຽງທີ່ສຸດ

  ---

  ## ລາຍການວຽກ
  - [ ] ນີ້ແມ່ນລາຍການວຽກທີ່ຍັງບໍ່ທັນສຳເລັດ
  - [x] ນີ້​ແມ່ນ​ວຽກ​ງານ​ບັນ​ຊີ​ລາຍ​ການ​ສໍາ​ເລັດ​
  - [X] ນີ້​ແມ່ນ​ວຽກ​ງານ​ບັນ​ຊີ​ລາຍ​ການ​ສໍາ​ເລັດ (ທຶນ X​)

  ---

  1. ສັ່ງສິນຄ້າທຳອິດ
     1. ສັ່ງຊື້ລາຍການໜຶ່ງ
     2. ຄໍາສັ່ງຍ່ອຍສອງ
  2. ໄດ້​ຮັບ​ຄໍາ​ສັ່ງ​ໃນ​ໄລ​ຍະ​ທີ່​ສອງ​
  ## ແຜ່ນ
  | ໂຄງການ | ລັດ | ຄະແນນ |
  | :--- | :---: | ---: |
  | ສະຖິດ | ສຳເລັດແລ້ວ | 100 |
  | ການຖ່າຍທອດ | ກຳລັງສະແດງຜົນ | 95 |
  ## ບລັອກລະຫັດ
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
