desc: Автоматично определяне и превключване към показване на менюто за навигация или бутона за връщане назад въз основа на текущия маршрут
desktop_title: Настолен дисплей
desktop_desc: Когато сте в декларирания маршрут на менюто, покажете плочките на елементите от менюто; в противен случай покажете бутона за връщане назад
mobile_title: Мобилен дисплей
mobile_desc: Когато е в декларирания маршрут на менюто, се свива в бутон с икона и поддържа плъзгане навън от менюто; в противен случай показва бутон за връщане назад
normal_state: Състояние на навигация (c-nav-меню)
back_state: Резервен статус (c-back)