desc: වත්මන් මාර්ගය මත පදනම්ව සංචාලන මෙනුව හෝ ආපසු බොත්තම සංදර්ශන කිරීමට ස්වයංක්‍රීයව තීරණය කර මාරු කරන්න
desktop_title: ඩෙස්ක්ටොප් සංදර්ශකය
desktop_desc: ප්‍රකාශිත මෙනු මාර්ගයේ ඇති විට, මෙනු අයිතම ටයිල් ප්‍රදර්ශනය කරන්න; එසේ නොමැතිනම් පසුපස බොත්තම පෙන්වන්න
mobile_title: ජංගම සංදර්ශකය
mobile_desc: ප්‍රකාශිත මෙනු මාර්ගයේ ඇති විට, අයිකන බොත්තමකට කඩා වැටී මෙනුවෙන් ලිස්සා යාමට සහය දක්වයි; එසේ නොමැතිනම් ආපසු බොත්තමක් පෙන්වයි
