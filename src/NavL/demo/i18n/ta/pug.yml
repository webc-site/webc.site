desc: நடப்பு பாதையின் அடிப்படையில் வழிசெலுத்தல் மெனு அல்லது பின் பொத்தானைக் காட்ட தானாகத் தீர்மானித்து மாறவும்
desktop_title: டெஸ்க்டாப் காட்சி
desktop_desc: அறிவிக்கப்பட்ட மெனு பாதையில், மெனு உருப்படிகளின் ஓடுகளைக் காண்பிக்கவும்; இல்லையெனில் பின் பொத்தானைக் காட்டவும்
mobile_title: மொபைல் காட்சி
mobile_desc: அறிவிக்கப்பட்ட மெனு பாதையில், ஐகான் பொத்தானில் சரிந்து, மெனுவை சறுக்குவதை ஆதரிக்கிறது; இல்லையெனில் பின் பட்டனைக் காட்டுகிறது
normal_state: வழிசெலுத்தல் நிலை (c-nav-menu)
back_state: வீழ்ச்சி நிலை (சி-பேக்)