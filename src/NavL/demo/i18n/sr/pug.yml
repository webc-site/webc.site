desc: Аутоматски одредите и пребаците се да бисте приказали навигациони мени или дугме за повратак на основу тренутне руте
desktop_title: Десктоп екран
desktop_desc: Када сте на декларисаној рути менија, прикажите плочице ставки менија; у супротном прикажите дугме за повратак
mobile_title: Мобилни екран
mobile_desc: Када је у декларисаној рути менија, сажима се у дугме са иконом и подржава извлачење менија; у супротном приказује дугме за повратак
normal_state: Статус навигације (ц-нав-мени)
back_state: Резервни статус (ц-бацк)