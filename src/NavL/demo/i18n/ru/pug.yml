desc: Автоматически определять и переключаться на отображение меню навигации или кнопки «Назад» в зависимости от текущего маршрута.
desktop_title: Дисплей рабочего стола
desktop_desc: В объявленном маршруте меню отображать плитки пунктов меню; в противном случае отобразите кнопку «Назад»
mobile_title: Мобильный дисплей
mobile_desc: В объявленном маршруте меню сворачивается в кнопку со значком и поддерживает выдвижение меню; в противном случае отображается кнопка «Назад»
normal_state: Статус навигации (c-nav-menu)
back_state: Резервный статус (c-back)