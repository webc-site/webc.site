desc: বর্তমান রুটের উপর ভিত্তি করে নেভিগেশন মেনু বা পিছনের বোতাম প্রদর্শন করতে স্বয়ংক্রিয়ভাবে নির্ধারণ করুন এবং স্যুইচ করুন
