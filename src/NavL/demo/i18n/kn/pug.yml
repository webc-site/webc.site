desc: ಪ್ರಸ್ತುತ ಮಾರ್ಗವನ್ನು ಆಧರಿಸಿ ನ್ಯಾವಿಗೇಷನ್ ಮೆನು ಅಥವಾ ಬ್ಯಾಕ್ ಬಟನ್ ಅನ್ನು ಪ್ರದರ್ಶಿಸಲು ಸ್ವಯಂಚಾಲಿತವಾಗಿ ನಿರ್ಧರಿಸಿ ಮತ್ತು ಬದಲಿಸಿ
desktop_title: ಡೆಸ್ಕ್ಟಾಪ್ ಪ್ರದರ್ಶನ
desktop_desc: ಡಿಕ್ಲೇರ್ಡ್ ಮೆನು ಮಾರ್ಗದಲ್ಲಿರುವಾಗ, ಮೆನು ಐಟಂಗಳ ಅಂಚುಗಳನ್ನು ಪ್ರದರ್ಶಿಸಿ; ಇಲ್ಲದಿದ್ದರೆ ಹಿಂದಿನ ಬಟನ್ ಅನ್ನು ಪ್ರದರ್ಶಿಸಿ
mobile_title: ಮೊಬೈಲ್ ಪ್ರದರ್ಶನ
mobile_desc: ಡಿಕ್ಲೇರ್ಡ್ ಮೆನು ರೂಟ್‌ನಲ್ಲಿರುವಾಗ, ಐಕಾನ್ ಬಟನ್‌ಗೆ ಕುಸಿಯುತ್ತದೆ ಮತ್ತು ಮೆನುವನ್ನು ಸ್ಲೈಡಿಂಗ್ ಮಾಡಲು ಬೆಂಬಲಿಸುತ್ತದೆ; ಇಲ್ಲದಿದ್ದರೆ ಬ್ಯಾಕ್ ಬಟನ್ ಅನ್ನು ಪ್ರದರ್ಶಿಸುತ್ತದೆ
