desc: Automatisch bepalen en overschakelen naar weergave van het navigatiemenu of de terugknop op basis van de huidige route
desktop_title: Desktopweergave
desktop_desc: Wanneer u zich in de aangegeven menuroute bevindt, geeft u de menu-itemtegels weer; geef anders de knop Terug weer
