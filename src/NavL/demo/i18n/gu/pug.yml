desc: વર્તમાન માર્ગના આધારે નેવિગેશન મેનૂ અથવા બેક બટન પ્રદર્શિત કરવા માટે આપમેળે નિર્ધારિત કરો અને સ્વિચ કરો
desktop_title: ડેસ્કટોપ ડિસ્પ્લે
desktop_desc: જ્યારે ઘોષિત મેનૂ રૂટમાં હોય, ત્યારે મેનુ વસ્તુઓની ટાઇલ્સ પ્રદર્શિત કરો; અન્યથા પાછળનું બટન પ્રદર્શિત કરો
mobile_title: મોબાઇલ ડિસ્પ્લે
mobile_desc: જ્યારે ઘોષિત મેનૂ રૂટમાં હોય, ત્યારે આયકન બટનમાં સંકુચિત થાય છે અને મેનૂને સરકાવવાને સપોર્ટ કરે છે; અન્યથા પાછળનું બટન દર્શાવે છે
normal_state: નેવિગેશન સ્થિતિ (c-nav-મેનૂ)
back_state: ફોલબેક સ્થિતિ (સી-બેક)