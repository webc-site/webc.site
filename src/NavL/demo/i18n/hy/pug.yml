desc: Ինքնաբերաբար որոշեք և միացրեք՝ ցուցադրելու նավիգացիոն ընտրացանկը կամ հետադարձ կոճակը՝ հիմնված ընթացիկ երթուղու վրա
desktop_title: Սեղանի էկրան
desktop_desc: Հայտարարված մենյուի երթուղիում ցուցադրեք ցանկի տարրերի սալիկները. հակառակ դեպքում ցուցադրեք ետ կոճակը
mobile_title: Բջջային էկրան
mobile_desc: Հայտարարված մենյուի երթուղու ժամանակ, այն ընկնում է պատկերակի կոճակի մեջ և աջակցում է ցանկից դուրս սահելուն. հակառակ դեպքում ցուցադրում է հետ կոճակը
normal_state: Նավիգացիայի կարգավիճակը (c-nav-menu)
back_state: Հետադարձ կարգավիճակ (c-back)