title1: Төтенше минимализм
desc1: |-
  WebC.site жұмыс уақытында жүктемесіз таза, жеңіл алдыңғы бөлік құрамдастарын құруға бағытталған.
  Қазіргі JS және CSS мүмкіндіктеріне сүйене отырып, ол нақтыланған кодпен шексіз мүмкіндіктерді ұсынады.

title2: AI дәуіріндегі алдыңғы қатарлы дамудың жаңа парадигмасы
desc2: |-
  Жасанды интеллект, автоматтандырылған кодтауға арналған даму ағынын толығымен қабылдайды.
  Код ережелері уақыт өте келе нақтыланады, бұл үлкен тіл үлгісіне шығындарды азайтуға және сіз үшін тиімділікті арттыруға мүмкіндік береді.

title3: Керемет көрнекі нормалар
desc3: |-
  Көрнекі эстетикалық дизайн керемет микро қозғалыс әсерлері мен аязды әйнек құрылымын біріктіреді.
  Ақ негіз, қарапайым және таза, қолданбалардың жоғары сапалы өзара әрекеттесу тәжірибесін жасауға көмектеседі.