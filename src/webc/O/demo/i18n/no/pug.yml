title1: Ekstrem minimalisme
desc1: |-
  WebC.site fokuserer på å bygge rene, lette front-end-komponenter uten kjøretidsbelastning.
  Basert på moderne js- og css-funksjoner, gir den uendelige muligheter med raffinert kode.

title2: Et nytt paradigme for front-end-utvikling i AI-tiden
desc2: |-
  Omfavn kunstig intelligens fullt ut, en utviklingsflyt designet for automatisert koding.
  Koderegler foredles over tid, slik at den store språkmodellen kan redusere kostnadene og øke effektiviteten for deg.

title3: Elegante visuelle normer
desc3: |-
  Den visuelle estetiske designen inneholder utsøkte mikrobevegelseseffekter og frostet glasstekstur.
  Hvit base, enkel og ren, hjelper deg å skape en høykvalitets appinteraksjonsopplevelse.