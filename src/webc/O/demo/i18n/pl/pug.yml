title1: Skrajny minimalizm
desc1: |-
  WebC.site koncentruje się na budowaniu czystych, lekkich komponentów front-end bez obciążania środowiska wykonawczego.
  Opierając się na nowoczesnych funkcjach js i css, prezentuje nieskończone możliwości dzięki dopracowanemu kodowi.

title2: Nowy paradygmat rozwoju front-endu w erze AI
desc2: |-
  W pełni wykorzystaj sztuczną inteligencję, proces programowania przeznaczony do automatycznego kodowania.
  Reguły kodu są z biegiem czasu udoskonalane, dzięki czemu model dużego języka pozwala obniżyć koszty i zwiększyć wydajność.

title3: Eleganckie standardy wizualne
desc3: |-
  Wizualna estetyka obejmuje znakomite efekty mikroruchu i teksturę matowego szkła.
  Biała podstawa, prosta i czysta, pomagająca stworzyć wysokiej jakości interakcję z aplikacją.