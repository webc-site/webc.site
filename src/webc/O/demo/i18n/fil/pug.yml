title1: Sobrang minimalism
desc1: |-
  Nakatuon ang WebC.site sa pagbuo ng dalisay, magaan na front-end na bahagi na walang runtime na pasanin.
  Umaasa sa modernong js at css na mga tampok, ito ay nagpapakita ng walang katapusang mga posibilidad na may pinong code.

title2: Isang bagong paradigm para sa front-end na pag-unlad sa panahon ng AI
desc2: |-
  Ganap na yakapin ang artificial intelligence, isang development flow na idinisenyo para sa automated coding.
  Ang mga panuntunan sa code ay pinino sa paglipas ng panahon, na nagpapahintulot sa malaking modelo ng wika na bawasan ang mga gastos at pataasin ang kahusayan para sa iyo.

title3: Mga eleganteng visual na pamantayan
desc3: |-
  Ang visual aesthetic na disenyo ay nagsasama ng mga katangi-tanging micro-motion effect at frosted glass texture.
  White base, simple at dalisay, na tumutulong sa iyong lumikha ng isang de-kalidad na karanasan sa pakikipag-ugnayan sa application.