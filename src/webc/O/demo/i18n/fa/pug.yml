title1: مینیمالیسم افراطی
desc1: |-
  WebC.site بر ساخت اجزای ظاهری خالص و سبک و بدون بار زمان اجرا تمرکز دارد.
  با تکیه بر ویژگی های مدرن js و css، امکانات بی نهایتی را با کدهای تصفیه شده ارائه می دهد.

title2: یک الگوی جدید برای توسعه front-end در عصر هوش مصنوعی
desc2: |-
  هوش مصنوعی را کاملاً بپذیرید، یک جریان توسعه که برای کدنویسی خودکار طراحی شده است.
  قوانین کد در طول زمان اصلاح می شوند و به مدل زبان بزرگ اجازه می دهد هزینه ها را کاهش دهد و کارایی را برای شما افزایش دهد.

title3: هنجارهای بصری زیبا
desc3: |-
  طراحی زیباشناختی بصری دارای جلوه های ریز حرکتی نفیس و بافت شیشه ای مات است.
  پایه سفید، ساده و خالص، به شما کمک می‌کند تا یک تجربه تعامل با اپلیکیشن با کیفیت بالا ایجاد کنید.