title1: Aşırı minimalizm
desc1: |-
  WebC.site, çalışma zamanı yükü olmayan saf, hafif ön uç bileşenleri oluşturmaya odaklanmaktadır.
  Modern js ve css özelliklerine dayanarak, rafine kodla sonsuz olanaklar sunar.

title2: Yapay zeka çağında ön uç geliştirme için yeni bir paradigma
desc2: |-
  Otomatik kodlama için tasarlanmış bir geliştirme akışı olan yapay zekayı tamamen benimseyin.
  Kod kuralları zaman içinde iyileştirilir ve büyük dil modelinin sizin için maliyetleri düşürmesine ve verimliliği artırmasına olanak tanır.

title3: Zarif görsel normlar
desc3: |-
  Görsel estetik tasarım, mükemmel mikro hareket efektlerini ve buzlu cam dokusunu içerir.
  Beyaz taban, basit ve saf, yüksek kaliteli bir uygulama etkileşimi deneyimi oluşturmanıza yardımcı olur.