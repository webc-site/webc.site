title1: Minimaliaeth eithafol
desc1: |-
  Mae WebC.site yn canolbwyntio ar adeiladu cydrannau pen blaen pur, ysgafn heb unrhyw faich amser rhedeg.
  Gan ddibynnu ar nodweddion js a css modern, mae'n cyflwyno posibiliadau anfeidrol gyda chod mireinio.

title2: Paradeim newydd ar gyfer datblygiad pen blaen yn yr oes AI
desc2: |-
  Cofleidiwch ddeallusrwydd artiffisial yn llawn, llif datblygu a gynlluniwyd ar gyfer codio awtomataidd.
  Mae rheolau cod yn cael eu mireinio dros amser, gan ganiatáu i'r model iaith mawr leihau costau a chynyddu effeithlonrwydd i chi.

title3: Normau gweledol cain
desc3: |-
  Mae'r dyluniad esthetig gweledol yn ymgorffori effeithiau micro-symudiad coeth a gwead gwydr barugog.
  Sylfaen gwyn, syml a phur, gan eich helpu i greu profiad rhyngweithio cymhwysiad o ansawdd uchel.