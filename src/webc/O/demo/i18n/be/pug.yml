title1: Экстрэмальны мінімалізм
desc1: |-
  WebC.site факусуюць на стварэнні чыстых, лёгкіх інтэрфейсных кампанентаў без нагрузкі падчас выканання.
  Абапіраючыся на сучасныя функцыі js і css, ён дае бясконцыя магчымасці з дапрацаваным кодам.

title2: Новая парадыгма інтэрфейснай распрацоўкі ў эпоху AI
desc2: |-
  У поўнай меры скарыстайцеся штучным інтэлектам, працэсам распрацоўкі, прызначаным для аўтаматызаванага кадавання.
  Правілы кода ўдасканальваюцца з цягам часу, што дазваляе вялікай моўнай мадэлі зніжаць выдаткі і павышаць вашу эфектыўнасць.

title3: Элегантныя візуальныя нормы
desc3: |-
  Візуальны эстэтычны дызайн уключае вытанчаныя эфекты мікраруху і тэкстуру матавага шкла.
  Белая база, простая і чыстая, дапамагае вам стварыць высакаякасны вопыт узаемадзеяння з праграмамі.