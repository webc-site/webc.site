desc: वर्तमान मार्ग के आधार पर नेविगेशन मेनू या बैक बटन प्रदर्शित करने के लिए स्वचालित रूप से निर्धारित करें और स्विच करें
desktop_title: डेस्कटॉप डिस्प्ले
desktop_desc: घोषित मेनू रूट में होने पर, मेनू आइटम टाइल्स प्रदर्शित करें; अन्यथा बैक बटन प्रदर्शित करें
mobile_title: मोबाइल डिस्प्ले
mobile_desc: जब घोषित मेनू मार्ग में, एक आइकन बटन में संक्षिप्त हो जाता है और मेनू को बाहर स्लाइड करने का समर्थन करता है; अन्यथा एक बैक बटन प्रदर्शित करता है
normal_state: नेविगेशन स्थिति (सी-एनएवी-मेनू)
back_state: फ़ॉलबैक स्थिति (सी-बैक)