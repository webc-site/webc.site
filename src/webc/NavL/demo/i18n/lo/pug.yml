desc: ອັດຕະໂນມັດກໍານົດແລະສະຫຼັບເພື່ອສະແດງເມນູນໍາທາງຫຼືປຸ່ມກັບຄືນໄປບ່ອນໂດຍອີງໃສ່ເສັ້ນທາງປະຈຸບັນ
desktop_title: ຈໍສະແດງຜົນ desktop
desktop_desc: ໃນ​ເວ​ລາ​ທີ່​ຢູ່​ໃນ​ເສັ້ນ​ທາງ​ເມ​ນູ​ປະ​ກາດ​, ສະ​ແດງ​ກະ​ເບື້ອງ​ລາຍ​ການ​ເມ​ນູ​; ຖ້າບໍ່ດັ່ງນັ້ນສະແດງປຸ່ມກັບຄືນໄປບ່ອນ
mobile_title: ຈໍສະແດງຜົນມືຖື
mobile_desc: ເມື່ອຢູ່ໃນເສັ້ນທາງເມນູທີ່ປະກາດ, ຫຍໍ້ລົງໃສ່ປຸ່ມໄອຄອນແລະສະຫນັບສະຫນູນການເລື່ອນອອກຈາກເມນູ; ຖ້າບໍ່ດັ່ງນັ້ນຈະສະແດງປຸ່ມກັບຄືນ
normal_state: ສະຖານະນຳທາງ (c-nav-menu)
back_state: ສະຖານະສຳຮອງ (c-back)