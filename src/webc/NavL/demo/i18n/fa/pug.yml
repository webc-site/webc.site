desc: به طور خودکار تعیین کنید و تغییر دهید تا منوی پیمایش یا دکمه برگشت بر اساس مسیر فعلی نمایش داده شود
desktop_title: نمایش دسکتاپ
desktop_desc: هنگامی که در مسیر منوی اعلام شده هستید، کاشی های آیتم های منو را نمایش دهید. در غیر این صورت دکمه برگشت را نمایش دهید
mobile_title: نمایشگر موبایل
mobile_desc: هنگامی که در مسیر منوی اعلام شده قرار دارید، در یک دکمه نماد جمع می شود و از لغزش به بیرون از منو پشتیبانی می کند. در غیر این صورت یک دکمه بازگشت نمایش داده می شود
normal_state: وضعیت ناوبری (c-nav-menu)
back_state: وضعیت بازگشت (c-back)