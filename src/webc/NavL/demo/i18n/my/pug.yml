desc: လက်ရှိလမ်းကြောင်းပေါ်အခြေခံ၍ လမ်းကြောင်းပြမီနူး သို့မဟုတ် နောက်ပြန်ခလုတ်ကို ပြသရန် အလိုအလျောက် ဆုံးဖြတ်ပြီး ပြောင်းပါ။
desktop_title: Desktop မျက်နှာပြင်
desktop_desc: ကြေညာထားသော မီနူးလမ်းကြောင်းတွင်ရှိသည့်အခါ၊ မီနူးအရာများကို အကွက်များကို ပြသပါ။ သို့မဟုတ်ပါက back ခလုတ်ကိုပြသပါ။
mobile_title: မိုဘိုင်းမျက်နှာပြင်
mobile_desc: ကြေညာထားသော မီနူးလမ်းကြောင်းတွင်ရှိသည့်အခါ၊ အိုင်ကွန်ခလုတ်တစ်ခုသို့ ပြိုကျပြီး မီနူးကို လျှောချရန် ပံ့ပိုးပေးသည်။ မဟုတ်ရင် back ခလုတ်ကို ပြပေးတယ်။
normal_state: လမ်းညွှန်မှုအခြေအနေ (c-nav-menu)
back_state: နောက်ခံအခြေအနေ (c-back)