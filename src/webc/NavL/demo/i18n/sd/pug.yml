desc: موجوده رستي جي بنياد تي نيويگيشن مينيو يا پوئتي بٽڻ کي ڊسپلي ڪرڻ لاء خودڪار طور تي طئي ڪيو ۽ سوئچ ڪريو
desktop_title: ڊيسڪ ٽاپ ڊسپلي
desktop_desc: جڏهن اعلان ڪيل مينيو رستي ۾، ڏيکاريو مينيو شيون ٽائلس؛ ٻي صورت ۾ واپس بٽڻ ڏيکاري
mobile_title: موبائل ڊسپلي
mobile_desc: جڏهن اعلان ڪيل مينيو رستي ۾، هڪ آئڪن جي بٽڻ ۾ ختم ٿي ويندو آهي ۽ مينيو کي سلائيڊ ڪرڻ جي حمايت ڪندو آهي؛ ٻي صورت ۾ واپس بٽڻ ڏيکاري ٿو
normal_state: نيويگيشن اسٽيٽس (c-nav-menu)
back_state: پوئتي موٽڻ واري حالت (سي-واپس)