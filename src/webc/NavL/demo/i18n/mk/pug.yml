desc: Автоматски одредувајте и префрлете се на прикажување на менито за навигација или копчето за назад врз основа на тековната рута
desktop_title: Десктоп екран
desktop_desc: Кога сте во декларираната рута на менито, прикажете ги плочките на ставките од менито; инаку прикажете го копчето за назад
mobile_title: Мобилен дисплеј
mobile_desc: Кога е во декларираната рута на менито, се собира во копче со икона и поддржува лизгање надвор од менито; инаку прикажува копче за назад
normal_state: Статус на навигација (c-nav-мени)
back_state: Повратен статус (c-back)