desc: Аўтаматычнае вызначэнне і пераключэнне на адлюстраванне меню навігацыі або кнопкі "Назад" на аснове бягучага маршруту
desktop_title: Дысплей працоўнага стала
desktop_desc: Калі вы знаходзіцеся ў заяўленым маршруце меню, адлюстроўвайце пліткі пунктаў меню; у адваротным выпадку паказаць кнопку "Назад".
mobile_title: Мабільны дысплей
mobile_desc: Калі знаходзіцца ў заяўленым маршруце меню, згортваецца ў кнопку са значком і падтрымлівае слізгаценне меню; у адваротным выпадку адлюстроўвае кнопку "Назад".
normal_state: Статус навігацыі (c-nav-меню)
back_state: Запасны статус (c-back)