jsInfo: جاوا اسکریپت یک زبان برنامه نویسی است که به طور گسترده در توسعه وب سمت مشتری استفاده می شود.
rsInfo: Rust یک زبان برنامه نویسی سیستمی است که بر ایمنی، سرعت و همزمانی تمرکز دارد.
pyInfo: پایتون یک زبان برنامه نویسی کامپیوتری شی گرا و تفسیر شده است.
macInfo: macOS یک سیستم عامل گرافیکی مبتنی بر یونیکس است که توسط اپل توسعه یافته است.
winInfo: ویندوز یک سیستم عامل کامپیوتر شخصی پرکاربرد است که توسط شرکت مایکروسافت توسعه یافته است.
aboutInfo: ما متعهد به توسعه کامپوننت‌های منبع باز با کیفیت بالا هستیم و از شرکت در آن خوش آمدید.