language: மொழி
os: அமைப்பு
about: பற்றி
jsInfo: ஜாவாஸ்கிரிப்ட் என்பது கிளையன்ட் பக்க இணைய வளர்ச்சியில் பரவலாகப் பயன்படுத்தப்படும் ஸ்கிரிப்டிங் மொழியாகும்.
rsInfo: ரஸ்ட் என்பது பாதுகாப்பு, வேகம் மற்றும் ஒத்திசைவு ஆகியவற்றில் கவனம் செலுத்தும் ஒரு கணினி நிரலாக்க மொழியாகும்.
pyInfo: பைதான் ஒரு பொருள் சார்ந்த, விளக்கப்பட்ட கணினி நிரலாக்க மொழி.
macInfo: மேகோஸ் என்பது யூனிக்ஸ்-அடிப்படையிலான வரைகலை இயக்க முறைமை ஆகும்.
winInfo: விண்டோஸ் என்பது மைக்ரோசாஃப்ட் கார்ப்பரேஷனால் உருவாக்கப்பட்ட பரவலாகப் பயன்படுத்தப்படும் தனிப்பட்ட கணினி இயக்க முறைமையாகும்.
aboutInfo: உயர்தர ஓப்பன் சோர்ஸ் முன்-இறுதிக் கூறுகளை உருவாக்க நாங்கள் கடமைப்பட்டுள்ளோம், நீங்கள் பங்கேற்க வரவேற்கிறோம்.