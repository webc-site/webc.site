language: භාෂාව
os: පද්ධතිය
about: ගැන
jsInfo: ජාවාස්ක්‍රිප්ට් යනු සේවාලාභී පාර්ශවීය වෙබ් සංවර්ධනයේදී බහුලව භාවිතා වන ස්ක්‍රිප්ටින් භාෂාවකි.
rsInfo: රස්ට් යනු ආරක්ෂාව, වේගය සහ සමගාමීත්වය කෙරෙහි අවධානය යොමු කරන පද්ධති ක්‍රමලේඛන භාෂාවකි.
pyInfo: Python යනු වස්තු-නැඹුරු, පරිවර්ථනය කරන ලද පරිගණක ක්‍රමලේඛන භාෂාවකි.
macInfo: macOS යනු Apple විසින් වැඩි දියුණු කරන ලද Unix මත පදනම් වූ චිත්‍රක මෙහෙයුම් පද්ධතියකි.
winInfo: වින්ඩෝස් යනු මයික්‍රොසොෆ්ට් කෝපරේෂන් විසින් සංවර්ධනය කරන ලද බහුලව භාවිතා වන පුද්ගලික පරිගණක මෙහෙයුම් පද්ධතියකි.
aboutInfo: උසස් තත්ත්වයේ විවෘත මූලාශ්‍ර ඉදිරිපස-අන්ත සංරචක සංවර්ධනය කිරීමට අපි කැපවී සිටින අතර, සහභාගී වීමට ඔබ සාදරයෙන් පිළිගනිමු.