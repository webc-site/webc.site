language: լեզուն
os: համակարգ
about: մասին
jsInfo: JavaScript-ը սկրիպտավորման լեզու է, որը լայնորեն օգտագործվում է հաճախորդի կողմից վեբ մշակման մեջ:
rsInfo: Rust-ը համակարգերի ծրագրավորման լեզու է, որը կենտրոնացած է անվտանգության, արագության և միաժամանակության վրա:
pyInfo: Python-ը օբյեկտի վրա հիմնված, մեկնաբանվող համակարգչային ծրագրավորման լեզու է:
macInfo: macOS-ը Unix-ի վրա հիմնված գրաֆիկական օպերացիոն համակարգ է, որը մշակվել է Apple-ի կողմից:
winInfo: Windows-ը լայնորեն օգտագործվող անհատական ​​համակարգչի օպերացիոն համակարգ է, որը մշակվել է Microsoft Corporation-ի կողմից։
aboutInfo: Մենք հավատարիմ ենք բարձրորակ բաց կոդով առաջնային բաղադրիչների մշակմանը, և դուք կարող եք մասնակցել: