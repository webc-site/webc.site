language: ພາສາ
os: ລະບົບ
about: ກ່ຽວກັບ
jsInfo: JavaScript ເປັນພາສາສະຄຣິບທີ່ໃຊ້ກັນຢ່າງກວ້າງຂວາງໃນການພັດທະນາເວັບຂ້າງລູກຄ້າ.
rsInfo: Rust ແມ່ນພາສາການຂຽນໂປຼແກຼມລະບົບທີ່ເນັ້ນໃສ່ຄວາມປອດໄພ, ຄວາມໄວ, ແລະສອດຄ່ອງ.
pyInfo: Python ແມ່ນພາສາການຂຽນໂປລແກລມຄອມພິວເຕີທີ່ເນັ້ນໃສ່ວັດຖຸ.
macInfo: macOS ແມ່ນລະບົບປະຕິບັດການກາຟິກທີ່ອີງໃສ່ Unix ທີ່ພັດທະນາໂດຍ Apple.
winInfo: Windows ເປັນລະບົບປະຕິບັດການຄອມພິວເຕີສ່ວນບຸກຄົນທີ່ໃຊ້ກັນຢ່າງກວ້າງຂວາງທີ່ພັດທະນາໂດຍ Microsoft Corporation.
aboutInfo: ພວກເຮົາມຸ່ງຫມັ້ນທີ່ຈະພັດທະນາອົງປະກອບດ້ານຫນ້າຂອງແຫຼ່ງເປີດທີ່ມີຄຸນນະພາບສູງ, ແລະຍິນດີຕ້ອນຮັບທ່ານເຂົ້າຮ່ວມ.