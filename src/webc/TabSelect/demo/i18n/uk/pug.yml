jsInfo: JavaScript — це мова сценаріїв, яка широко використовується в веб-розробці на стороні клієнта.
rsInfo: Rust — це мова системного програмування, зосереджена на безпеці, швидкості та паралелізмі.
pyInfo: Python — це об’єктно-орієнтована, інтерпретована мова комп’ютерного програмування.
macInfo: macOS — це графічна операційна система на базі Unix, розроблена Apple.
winInfo: Windows — широко поширена операційна система для персональних комп’ютерів, розроблена корпорацією Microsoft.
aboutInfo: Ми прагнемо розробляти високоякісні інтерфейсні компоненти з відкритим кодом, і ви можете взяти участь.