jsInfo: जावास्क्रिप्ट एक स्क्रिप्टिंग भाषा है जिसका व्यापक रूप से क्लाइंट-साइड वेब विकास में उपयोग किया जाता है।
rsInfo: रस्ट एक सिस्टम प्रोग्रामिंग भाषा है जो सुरक्षा, गति और समवर्तीता पर केंद्रित है।
pyInfo: पायथन एक ऑब्जेक्ट-ओरिएंटेड, व्याख्या की गई कंप्यूटर प्रोग्रामिंग भाषा है।
macInfo: macOS Apple द्वारा विकसित एक यूनिक्स-आधारित ग्राफिकल ऑपरेटिंग सिस्टम है।
winInfo: विंडोज़ माइक्रोसॉफ्ट कॉर्पोरेशन द्वारा विकसित एक व्यापक रूप से उपयोग किया जाने वाला पर्सनल कंप्यूटर ऑपरेटिंग सिस्टम है।
aboutInfo: हम उच्च गुणवत्ता वाले ओपन सोर्स फ्रंट-एंड घटकों को विकसित करने के लिए प्रतिबद्ध हैं, और भाग लेने के लिए आपका स्वागत है।