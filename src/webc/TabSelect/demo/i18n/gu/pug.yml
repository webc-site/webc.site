language: ભાષા
os: સિસ્ટમ
about: વિશે
jsInfo: JavaScript એ ક્લાયંટ-સાઇડ વેબ ડેવલપમેન્ટમાં વ્યાપકપણે ઉપયોગમાં લેવાતી સ્ક્રિપ્ટીંગ ભાષા છે.
rsInfo: રસ્ટ એ એક સિસ્ટમ પ્રોગ્રામિંગ લેંગ્વેજ છે જે સલામતી, ઝડપ અને સંમતિ પર કેન્દ્રિત છે.
pyInfo: પાયથોન એ ઑબ્જેક્ટ-ઓરિએન્ટેડ, અર્થઘટન કરાયેલ કમ્પ્યુટર પ્રોગ્રામિંગ ભાષા છે.
macInfo: macOS એ Apple દ્વારા વિકસિત યુનિક્સ-આધારિત ગ્રાફિકલ ઓપરેટિંગ સિસ્ટમ છે.
winInfo: Windows એ માઈક્રોસોફ્ટ કોર્પોરેશન દ્વારા વિકસિત વ્યાપકપણે ઉપયોગમાં લેવાતી વ્યક્તિગત કમ્પ્યુટર ઓપરેટિંગ સિસ્ટમ છે.
aboutInfo: અમે ઉચ્ચ-ગુણવત્તાવાળા ઓપન સોર્સ ફ્રન્ટ-એન્ડ ઘટકો વિકસાવવા માટે પ્રતિબદ્ધ છીએ, અને ભાગ લેવા માટે તમારું સ્વાગત છે.