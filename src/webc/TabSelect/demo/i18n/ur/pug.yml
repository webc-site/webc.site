language: زبان
os: نظام
about: کے بارے میں
jsInfo: JavaScript ایک اسکرپٹنگ زبان ہے جو کلائنٹ سائڈ ویب ڈویلپمنٹ میں وسیع پیمانے پر استعمال ہوتی ہے۔
rsInfo: زنگ ایک نظام پروگرامنگ زبان ہے جو حفاظت، رفتار، اور ہم آہنگی پر مرکوز ہے۔
pyInfo: Python ایک آبجیکٹ پر مبنی، تشریح شدہ کمپیوٹر پروگرامنگ زبان ہے۔
macInfo: macOS ایک یونکس پر مبنی گرافیکل آپریٹنگ سسٹم ہے جسے Apple نے تیار کیا ہے۔
winInfo: ونڈوز ایک وسیع پیمانے پر استعمال ہونے والا ذاتی کمپیوٹر آپریٹنگ سسٹم ہے جسے Microsoft Corporation نے تیار کیا ہے۔
aboutInfo: ہم اعلیٰ معیار کے اوپن سورس فرنٹ اینڈ پرزے تیار کرنے کے لیے پرعزم ہیں، اور آپ کا شرکت کرنے کا خیرمقدم ہے۔