language: ଭାଷା
os: ସିଷ୍ଟମ୍
about: ବିଷୟରେ
jsInfo: କ୍ଲାଏଣ୍ଟ-ସାଇଡ୍ ୱେବ୍ ବିକାଶରେ ଜାଭାସ୍କ୍ରିପ୍ଟ ହେଉଛି ଏକ ସ୍କ୍ରିପ୍ଟିଂ ଭାଷା |
rsInfo: ରୁଷ୍ଟ ହେଉଛି ଏକ ସିଷ୍ଟମ ପ୍ରୋଗ୍ରାମିଂ ଭାଷା ଯାହା ସୁରକ୍ଷା, ଗତି ଏବଂ ସମନ୍ୱୟ ଉପରେ ଧ୍ୟାନ ଦେଇଥାଏ |
pyInfo: ପାଇଥନ୍ ହେଉଛି ଏକ ଅବଜେକ୍ଟ-ଆଧାରିତ, ବ୍ୟାଖ୍ୟା କରାଯାଇଥିବା କମ୍ପ୍ୟୁଟର ପ୍ରୋଗ୍ରାମିଂ ଭାଷା |
macInfo: ମାକୋସ୍ ହେଉଛି ଏକ ୟୁନିକ୍ସ-ଆଧାରିତ ଗ୍ରାଫିକାଲ୍ ଅପରେଟିଂ ସିଷ୍ଟମ୍ ଯାହା ଆପଲ୍ ଦ୍ୱାରା ବିକଶିତ |
winInfo: ୱିଣ୍ଡୋଜ୍ ହେଉଛି ମାଇକ୍ରୋସଫ୍ଟ କର୍ପୋରେସନ୍ ଦ୍ୱାରା ବିକଶିତ ବ୍ୟକ୍ତିଗତ କମ୍ପ୍ୟୁଟର ଅପରେଟିଂ ସିଷ୍ଟମ୍ |
aboutInfo: ଆମେ ଉଚ୍ଚ-ଗୁଣାତ୍ମକ ମୁକ୍ତ ଉତ୍ସ ଫ୍ରଣ୍ଟ-ଏଣ୍ଡ ଉପାଦାନଗୁଡ଼ିକର ବିକାଶ ପାଇଁ ପ୍ରତିବଦ୍ଧ, ଏବଂ ଆପଣ ଏଥିରେ ଅଂଶଗ୍ରହଣ କରିବାକୁ ସ୍ୱାଗତ |