language: ენა
os: სისტემა
about: შესახებ
jsInfo: JavaScript არის სკრიპტირების ენა, რომელიც ფართოდ გამოიყენება კლიენტის მხარეს ვებ დეველოპმენტში.
rsInfo: Rust არის სისტემების პროგრამირების ენა, რომელიც ორიენტირებულია უსაფრთხოებაზე, სიჩქარეზე და კონკურენტულობაზე.
pyInfo: პითონი არის ობიექტზე ორიენტირებული, ინტერპრეტირებული კომპიუტერული პროგრამირების ენა.
macInfo: macOS არის Unix-ზე დაფუძნებული გრაფიკული ოპერაციული სისტემა, რომელიც შემუშავებულია Apple-ის მიერ.
winInfo: Windows არის ფართოდ გამოყენებული პერსონალური კომპიუტერის ოპერაციული სისტემა, რომელიც შემუშავებულია Microsoft Corporation-ის მიერ.
aboutInfo: ჩვენ მზად ვართ შევიმუშაოთ მაღალი ხარისხის ღია კოდის ფრონტ-ენდის კომპონენტები და მოგესალმებათ მონაწილეობა.