mdContent: |
  # මාර්ක්ඩවුන් ඉදිරිපත් කිරීමේ ලේඛනය
  මෙය **ස්ථිතික විදැහුම්කරණය** නිරූපණයකි.
  ## මූලික ශෛලිය
  - ** තද ** සහ * ඇල අකුරු*
  - ~~වර්ජන~~
  - `inline_code` පේළිගත කේතය
  - [එක්සත් ජාතීන්ගේ නිල වෙබ් අඩවිය](https://un.org) සබැඳි නිරූපණය
  ## උපුටා දැක්වීම් සහ ලැයිස්තු
  > මෙය තනි පේළියක උපුටා දැක්වීමකි.

  > මෙය බහු රේඛා උපුටා දැක්වීමකි.
  > බහු රේඛා යොමු දැක්වීම සඳහා දෘශ්‍ය ප්‍රයෝගයක්.

  - ඇණවුම් නොකළ පළමු අයිතමය
    - අනුපිළිවෙලක් නැති උප අයිතම එක
    - අනුපිළිවෙලට නොදැමූ උප අයිතම දෙක
  - දෙවන අයිතමය ඇණවුම් නොකළේය

  > [!NOTE]
  > `> [!NOTE]` සාමාන්‍ය පණිවිඩ සහ සටහන්

  > [!TIP]
  > `> [!TIP]` ඉඟි සහ ප්‍රයෝජනවත් ඉඟි

  > [!IMPORTANT]
  > `> [!IMPORTANT]` වැදගත් ඉඟි සහ උත්සුකයන්

  > [!WARNING]
  > `> [!WARNING]` අවදානම් අනතුරු ඇඟවීම් සහ සටහන්

  > [!CAUTION]
  > `> [!CAUTION]` අන්තරාය සහ අතිශය අවදානම් අනතුරු ඇඟවීම

  ---

  ## කාර්ය ලැයිස්තුව
  - [ ] මෙය නිම නොකළ කාර්යයන් ලැයිස්තුවකි
  - [x] මෙය සම්පුර්ණ කරන ලද ලැයිස්තු කාර්යයකි
  - [X] මෙය සම්පුර්ණ කරන ලද ලැයිස්තු කාර්යයකි (කැපිටල් X)

  ---

  1. පළමු අයිතමය ඇණවුම් කළා
     1. එක භාණ්ඩයක් ඇණවුම් කළා
     2. අනුපිටපත දෙක ඇණවුම් කළා
  2. දෙවන වාරය ඇණවුම් කළා
  ## පත්රය
  | ව්යාපෘතිය | රාජ්ය | ස්කෝර් |
  | :--- | :---: | ---: |
  | ස්ථිතික | සම්පූර්ණ කළා | 100 |
  | ප්රවාහය | විදැහුම්කරණය | 95 |
  ## කේතය අවහිර කිරීම
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## පින්තූරය
  ![Demo පින්තූරය](https://i-01.eu.org/demo-green.avif)