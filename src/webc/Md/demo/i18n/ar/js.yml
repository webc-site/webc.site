mdContent: |
  # وثيقة عرض تخفيض السعر
  هذا عرض توضيحي **للعرض الثابت**.
  ## النمط الأساسي
  - **غامق** و *مائل*
  - ~~ يتوسطه خط ~~
  - `inline_code` الكود المضمن
  - [الموقع الرسمي للأمم المتحدة](https://un.org) الرابط التوضيحي
  ## الاقتباسات والقوائم
  > هذا اقتباس من سطر واحد.

  > هذا اقتباس متعدد الأسطر.
  > تأثير مرئي لعرض المراجع متعددة الأسطر.

  - العنصر الأول غير مرتب
    - البند الفرعي الأول غير مرتب
    - البند الفرعي الثاني غير مرتب
  - البند الثاني غير مرتبة

  > [!NOTE]
  > `> [!NOTE]` رسائل وملاحظات عامة

  > [!TIP]
  > `> [!TIP]` نصائح وإرشادات مفيدة

  > [!IMPORTANT]
  > `> [!IMPORTANT]` نصائح واهتمامات هامة

  > [!WARNING]
  > `> [!WARNING]` تحذيرات وملاحظات المخاطر

  > [!CAUTION]
  > `> [!CAUTION]` تحذير من الخطر والمخاطر الشديدة

  ---

  ## قائمة المهام
  - [ ] هذه قائمة غير مكتملة من المهام
  - [x] هذه مهمة قائمة مكتملة
  - [X] هذه مهمة قائمة مكتملة (الحرف X الكبير)

  ---

  1. أمرت العنصر الأول
     1. أمرت البند واحد
     2. أمرت البند الفرعي الثاني
  2. أمرت الفصل الدراسي الثاني
  ## ملزمة
  | مشروع | ولاية | نتيجة |
  | :--- | :---: | ---: |
  | ثابت | مكتمل | 100 |
  | جاري | التقديم | 95 |
  ## كتلة التعليمات البرمجية
