mdContent: |
  # سند ارائه Markdown
  این نمایش ** رندر استاتیک** است.
  ## سبک پایه
  - **پررنگ** و *ایتالیک*
  - ~~ضربه ~~
  - کد درون خطی `inline_code`
  - [وب سایت رسمی سازمان ملل](https://un.org) نمایش پیوند
  ## نقل قول ها و فهرست ها
  > این نقل قول تک خطی است.

  > این یک نقل قول چند خطی است.
  > یک جلوه بصری برای نمایش مراجع چند خطی.

  - اولین مورد بدون سفارش
    - زیرمجموعه یک نامرتب
    - زیرمجموعه دو نامرتب
  - مورد دوم بدون سفارش

  > [!NOTE]
  > `> [!NOTE]` پیام‌ها و یادداشت‌های عمومی

  > [!TIP]
  > `> [!TIP]` نکات و نکات مفید

  > [!IMPORTANT]
  > `> [!IMPORTANT]` نکات و نگرانی های مهم

  > [!WARNING]
  > `> [!WARNING]` هشدارها و نکات خطر

  > [!CAUTION]
  > `> [!CAUTION]` هشدار خطر و خطر شدید

  ---

  ## لیست وظایف
  - [ ] این یک لیست ناتمام از وظایف است
  - [x] این یک کار لیست تکمیل شده است
  - [X] این یک کار لیست تکمیل شده است (X بزرگ)

  ---

  1. اولین مورد را سفارش داد
     1. مورد یک را سفارش داد
     2. زیرمجموعه دو را سفارش داد
  2. ترم دوم سفارش داد
  ## ورق
  | پروژه | دولت | نمره |
  | :--- | :---: | ---: |
  | ایستا | تکمیل شد | 100 |
  | جریان | رندرینگ | 95 |
  ## بلوک کد
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
