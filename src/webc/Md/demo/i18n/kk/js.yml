mdContent: |
  # Markdown презентация құжаты
  Бұл **статикалық көрсету** демонстрация.
  ## Негізгі стиль
  - **Қалың** және *Көлбеу*
  - ~~ сызылған~~
  - `inline_code` кірістірілген код
  - [Біріккен Ұлттар Ұйымының ресми веб-сайты](https://un.org) Сілтеме демонстрациясы
  ## Дәйексөздер мен тізімдер
  > Бұл бір жолды дәйексөз.

  > Бұл көп жолды дәйексөз.
  > Көп жолды сілтемелерді көрсетуге арналған көрнекі әсер.

  - Реттелмеген бірінші элемент
    - Бірінші ретсіз ішкі тармақ
    - Екінші ретсіз тармақша
  - Реттелмеген екінші элемент

  > [!NOTE]
  > `> [!NOTE]` Жалпы хабарлар мен ескертпелер

  > [!TIP]
  > `> [!TIP]` Кеңестер мен пайдалы кеңестер

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Маңызды кеңестер мен алаңдаушылықтар

  > [!WARNING]
  > `> [!WARNING]` Тәуекел ескертулері мен ескертпелер

  > [!CAUTION]
  > `> [!CAUTION]` ҚАУІП ЖӘНЕ АСЫ ҚАУІП ЕСКЕРТУ

  ---

  ## тапсырмалар тізімі
  - [ ] Бұл аяқталмаған тапсырмалар тізімі
  - [x] Бұл орындалған тізім тапсырмасы
  - [X] Бұл орындалған тізім тапсырмасы (Х бас әріп)

  ---

  1. Бірінші затқа тапсырыс берілді
     1. Тапсырыс берілген бірінші зат
     2. Екінші тармақша реттелген
  2. Екінші мерзімге тапсырыс берілді
  ## парақ
  | жоба | күй | ұпай |
  | :--- | :---: | ---: |
  | статикалық | Аяқталды | 100 |
  | ағын | Рендеринг | 95 |
  ## код блогы
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
