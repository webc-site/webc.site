mdContent: |
  # মাৰ্কডাউন উপস্থাপন নথিপত্ৰ
  এইটো এটা **স্থিতিশীল ৰেণ্ডাৰ** প্ৰদৰ্শন।
  ## মৌলিক শৈলী
  - **গাঢ়** আৰু *ইটালিক*
  - ~~ষ্ট্ৰাইকথ্ৰু~~
  - `inline_code` ইনলাইন ক'ড
  - [ৰাষ্ট্ৰসংঘৰ অফিচিয়েল ৱেবছাইট](https://un.org) লিংক প্ৰদৰ্শন
  ## উদ্ধৃতি আৰু তালিকা
  > এইটো এটা একক শাৰীৰ উদ্ধৃতি।

  > এইটো এটা বহু শাৰীৰ উদ্ধৃতি।
  > বহু-শাৰী প্ৰসংগ প্ৰদৰ্শনৰ বাবে এটা দৃশ্যমান প্ৰভাৱ।

  - অৰ্ডাৰ কৰা প্ৰথম বস্তু
    - অৰ্ডাৰড চাবআইটেম এটা
    - অক্ৰমিত উপবস্তু দুটা
  - অৰ্ডাৰ কৰা দ্বিতীয় বস্তু

  > [!NOTE]
  > `> [!NOTE]` সাধাৰণ বাৰ্তা আৰু টোকাসমূহ

  > [!TIP]
  > `> [!TIP]` টিপচ্ আৰু সহায়ক টিপছ

  > [!IMPORTANT]
  > `> [!IMPORTANT]` গুৰুত্বপূৰ্ণ টিপচ্ আৰু উদ্বেগ

  > [!WARNING]
  > `> [!WARNING]` বিপদৰ সতৰ্কবাণী আৰু টোকাসমূহ

  > [!CAUTION]
  > `> [!CAUTION]` বিপদ আৰু চৰম বিপদৰ সতৰ্কবাণী

  ---

  ## কাৰ্য্য তালিকা
  - [ ] এইটো এটা অসমাপ্ত কামৰ তালিকা
  - [x] এইটো এটা সম্পূৰ্ণ তালিকাৰ কাম
  - [X] এইটো এটা সম্পূৰ্ণ তালিকাৰ কাম (কেপিটেল X)

  ---

  1. প্ৰথম বস্তু অৰ্ডাৰ কৰিলে
     1. অৰ্ডাৰ কৰা বস্তু এটা
     2. অৰ্ডাৰ দিলে চাবআইটেম দুটা
  2. দ্বিতীয় কাৰ্যকালৰ নিৰ্দেশ
  ## চাদৰ
  | প্ৰকল্প | ৰাজ্য | মানংক |
  | :--- | :---: | ---: |
  | ষ্টেটিক | সম্পূৰ্ণ হ’ল | 100 |
  | ষ্ট্ৰীমিং | ৰেণ্ডাৰ কৰা | 95 |
  ## ক'ড ব্লক
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
