mdContent: |
  # მარკდაუნის საპრეზენტაციო დოკუმენტი
  ეს არის **სტატიკური რენდერის ** დემონსტრირება.
  ## ძირითადი სტილი
  - ** თამამი ** და * დახრილი *
  - ~~ დარტყმა~~
  - `inline_code` შიდა კოდი
  - [გაერთიანებული ერების ორგანიზაციის ოფიციალური ვებგვერდი](https://un.org) ბმული დემონსტრაცია
  ## ციტატები და სიები
  > ეს არის ერთსტრიქონიანი ციტატა.

  > ეს არის მრავალსტრიქონიანი ციტატა.
  > ვიზუალური ეფექტი მრავალხაზოვანი მითითებების ჩვენებისთვის.

  - შეუკვეთავი პირველი ელემენტი
    - შეუკვეთავი ქვეპუნქტი პირველი
    - შეუკვეთავი ქვეპუნქტი მეორე
  - შეუკვეთავი მეორე ნივთი

  > [!NOTE]
  > `> [!NOTE]` ზოგადი შეტყობინებები და შენიშვნები

  > [!TIP]
  > `> [!TIP]` რჩევები და სასარგებლო რჩევები

  > [!IMPORTANT]
  > `> [!IMPORTANT]` მნიშვნელოვანი რჩევები და პრობლემები

  > [!WARNING]
  > `> [!WARNING]` რისკის გაფრთხილებები და შენიშვნები

  > [!CAUTION]
  > `> [!CAUTION]` საფრთხისა და უკიდურესი რისკის გაფრთხილება

  ---

  ## დავალების სია
  - [ ] ეს არის ამოცანების დაუმთავრებელი სია
  - [x] ეს არის დასრულებული სიის დავალება
  - [X] ეს არის დასრულებული სიის დავალება (კაპიტალი X)

  ---

  1. შეუკვეთა პირველი ნივთი
     1. შეუკვეთეთ პირველი ნივთი
     2. შეუკვეთა მეორე ქვეპუნქტი
  2. შეუკვეთა მეორე ვადა
  ## ფურცელი
  | პროექტი | სახელმწიფო | ქულა |
  | :--- | :---: | ---: |
  | სტატიკური | დასრულებული | 100 |
  | ნაკადი | რენდერირება | 95 |
  ## კოდის ბლოკი
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## სურათი
