  # Markdown bemutató dokumentum
  Ez a Streaming Rendering bemutatója.
  ## Alapstílus
  - **félkövér** és *dőlt*
  - ~~áthúzás~~
  - `inline_code` soron belüli kód
  - [Az Egyesült Nemzetek hivatalos weboldala](https://un.org) Linkbemutató
  ## Idézetek és listák
  > Ez egy egysoros idézet.

  > Ez egy többsoros idézet.
  > Vizuális hatás többsoros hivatkozások megjelenítéséhez.

  - Rendeletlen első tétel
    - Rendeletlen altétel
    - Rendeletlen második altétel
  - Rendeletlen második tétel

  > [!NOTE]
  > `> [!NOTE]` Általános üzenetek és megjegyzések

  > [!TIP]
  > `> [!TIP]` Tippek és hasznos tippek

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Fontos tippek és aggályok

  > [!WARNING]
  > `> [!WARNING]` Kockázati figyelmeztetések és megjegyzések

  > [!CAUTION]
  > `> [!CAUTION]` VESZÉLY ÉS RENDKÍVÜLI KOCKÁZAT FIGYELMEZTETÉS

