mdContent: |
  # માર્કડાઉન પ્રસ્તુતિ દસ્તાવેજ
  આ સ્ટ્રીમિંગ રેન્ડરિંગનું પ્રદર્શન છે.
  ## મૂળભૂત શૈલી
  - **બોલ્ડ** અને *ઇટાલિક*
  - ~~સ્ટ્રાઇકથ્રુ~~
  - `inline_code` ઇનલાઇન કોડ
  - [સંયુક્ત રાષ્ટ્રની સત્તાવાર વેબસાઇટ](https://un.org) લિંક પ્રદર્શન
  ## અવતરણ અને યાદીઓ
  > આ સિંગલ લાઇન ક્વોટ છે.

  > આ મલ્ટિ-લાઇન ક્વોટ છે.
  > મલ્ટિ-લાઇન રેફરન્સ પ્રદર્શિત કરવા માટે વિઝ્યુઅલ ઇફેક્ટ.

  - અવ્યવસ્થિત પ્રથમ આઇટમ
    - અવ્યવસ્થિત સબઇટમ એક
    - અક્રમિત સબટમ બે
  - અવ્યવસ્થિત બીજી આઇટમ

  > [!NOTE]
  > `> [!NOTE]` સામાન્ય સંદેશાઓ અને નોંધો

  > [!TIP]
  > `> [!TIP]` ટીપ્સ અને મદદરૂપ ટીપ્સ

  > [!IMPORTANT]
  > `> [!IMPORTANT]` મહત્વપૂર્ણ ટીપ્સ અને ચિંતાઓ

  > [!WARNING]
  > `> [!WARNING]` જોખમની ચેતવણીઓ અને નોંધો

  > [!CAUTION]
  > `> [!CAUTION]` જોખમ અને અત્યંત જોખમની ચેતવણી

  ---

  ## કાર્ય યાદી
  - [ ] આ એક અધૂરું સ્ટ્રીમિંગ કાર્ય છે
  - [x] આ એક પૂર્ણ થયેલ સ્ટ્રીમિંગ કાર્ય છે
  - [X] આ એક પૂર્ણ થયેલ સ્ટ્રીમિંગ કાર્ય છે (કેપિટલ X)

  ---

  1. પ્રથમ વસ્તુનો ઓર્ડર આપ્યો
     1. આઇટમ એકનો ઓર્ડર આપ્યો
     2. સબઇટમ બેનો આદેશ આપ્યો
  2. બીજી ટર્મનો ઓર્ડર આપ્યો
  ## શીટ
  | કાર્ય | રાજ્ય | સમયપત્રક |
  | :--- | :---: | ---: |
  | એક કાર્ય | પૂર્ણ થયું | 100% |
  | કાર્ય 2 | ચાલુ છે | 50% |
  ## કોડ બ્લોક
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## ચિત્ર
  ![ડેમો ચિત્ર](https://i-01.eu.org/demo-green.avif)