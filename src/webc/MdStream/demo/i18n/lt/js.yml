mdContent: |
  # Markdown pristatymo dokumentas
  Tai yra srautinio atvaizdavimo demonstravimas.
  ## Pagrindinis stilius
  - **Paryškintas** ir *kursyvas*
  - ~~perbraukimas~~
  - `inline_code` eilutinis kodas
  - [Jungtinių Tautų oficiali svetainė](https://un.org) Nuorodos demonstravimas
  ## Citatos ir sąrašai
  > Tai vienos eilutės citata.

  > Tai kelių eilučių citata.
  > Vaizdinis efektas kelių eilučių nuorodoms rodyti.

  - Neužsakyta pirmoji prekė
    - Neužsakytas pirmas poskyris
    - Neužsakytas antrasis punktas
  - Neužsakyta antra prekė

  > [!NOTE]
  > `> [!NOTE]` Bendrieji pranešimai ir pastabos

  > [!TIP]
  > `> [!TIP]` Patarimai ir naudingi patarimai

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Svarbūs patarimai ir rūpesčiai

  > [!WARNING]
  > `> [!WARNING]` Įspėjimai ir pastabos apie riziką

  > [!CAUTION]
  > `> [!CAUTION]` ĮSPĖJIMAS DĖL PAVOJUS IR YPATINGOS RIZIKOS

  ---

  ## užduočių sąrašas
  - [ ] Tai nebaigta srautinio perdavimo užduotis
  - [x] Tai atlikta srautinio perdavimo užduotis
  - [X] Tai atlikta srautinio perdavimo užduotis (didžioji raidė X)

  ---

  1. Užsakyta pirmoji prekė
     1. Užsakyta viena prekė
     2. Užsakyta antra dalis
  2. Užsakyta antrai kadencijai
  ## lapas
  | Užduotis | valstybė | tvarkaraštį |
  | :--- | :---: | ---: |
  | Užduotis viena | Užbaigta | 100% |
  | 2 užduotis | vyksta | 50% |
