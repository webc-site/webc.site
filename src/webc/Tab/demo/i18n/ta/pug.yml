apple: ஆப்பிள்
banana: வாழைப்பழம்
orange: டேன்ஜரின்
appleInfo: ஆப்பிள் சத்துக்கள் நிறைந்த ஒரு பொதுவான பழம்.
bananaInfo: வாழைப்பழம் வெப்பமண்டல பகுதிகளில் பரவலாக வளர்க்கப்படும் ஒரு சுவையான பழமாகும்.
orangeInfo: ஆரஞ்சுகள் பிரகாசமான நிறத்திலும், தாகமாகவும், இனிப்பாகவும், வைட்டமின் சி நிறைந்ததாகவும் இருக்கும்.