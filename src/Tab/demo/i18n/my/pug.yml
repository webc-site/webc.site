apple: ပန်းသီး
banana: ငှက်ပျောသီး
orange: အခွံပွလိမ္မော်သီး
appleInfo: ပန်းသီးသည် အာဟာရဓာတ်ကြွယ်ဝသော သာမာန်အသီးတစ်မျိုးဖြစ်သည်။
bananaInfo: ငှက်ပျောသီးသည် အပူပိုင်းဒေသများတွင် တွင်ကျယ်စွာ စိုက်ပျိုးထားသော အရသာရှိသော အသီးတစ်မျိုးဖြစ်သည်။
orangeInfo: လိမ္မော်သီးများသည် အရောင်တောက်တောက်၊ အရည်ရွှမ်းပြီး ချိုမြိန်ပြီး ဗီတာမင် C ကြွယ်ဝသည်။