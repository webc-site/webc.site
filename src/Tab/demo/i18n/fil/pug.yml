appleInfo: Ang mansanas ay isang pangkaraniwang prutas na mayaman sa sustansya.
bananaInfo: Ang saging ay isang masarap na prutas na malawakang itinatanim sa mga tropikal na lugar.
orangeInfo: Ang mga dalandan ay maliwanag ang kulay, makatas at matamis, at mayaman sa bitamina C.