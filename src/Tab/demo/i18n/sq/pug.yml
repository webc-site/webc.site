apple: mollë
banana: banane
orange: mandarina
appleInfo: Molla është një frut i zakonshëm që është i pasur me lëndë ushqyese.
bananaInfo: Banania është një frut i shijshëm që rritet gjerësisht në zonat tropikale.
orangeInfo: Portokallet janë me ngjyrë të ndezur, të lëngshëm dhe të ëmbël dhe të pasur me vitaminë C.