appleInfo: Omena on yleinen hedelmä, joka sisältää runsaasti ravintoaineita.
bananaInfo: Banaani on herkullinen hedelmä, jota kasvatetaan laajalti trooppisilla alueilla.
orangeInfo: Appelsiinit ovat väriltään kirkkaita, mehukkaita ja makeita, ja niissä on runsaasti C-vitamiinia.