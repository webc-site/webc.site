appleInfo: Mae afal yn ffrwyth cyffredin sy'n llawn maetholion.
bananaInfo: Mae banana yn ffrwyth blasus sy'n cael ei dyfu'n eang mewn ardaloedd trofannol.
orangeInfo: Mae orennau yn llachar o ran lliw, yn llawn sudd a melys, ac yn gyfoethog mewn fitamin C.