mdContent: |
  # मार्कडाउन सादरीकरण दस्तऐवज
  हे स्ट्रीमिंग रेंडरिंगचे प्रात्यक्षिक आहे.
  ## मूळ शैली
  - **ठळक** आणि *इटालिक*
  - ~~स्ट्राइकथ्रू~~
  - `inline_code` इनलाइन कोड
  - [संयुक्त राष्ट्रांची अधिकृत वेबसाइट](https://un.org) लिंक प्रात्यक्षिक
  ## कोट्स आणि याद्या
  > हा एकच ओळीचा कोट आहे.

  > हे एक मल्टी-लाइन कोट आहे.
  > मल्टी-लाइन संदर्भ प्रदर्शित करण्यासाठी दृश्य प्रभाव.

  - अक्रमित पहिला आयटम
    - अक्रमित subitem एक
    - अक्रमित उप आयटम दोन
  - अक्रमित दुसरा आयटम

  > [!NOTE]
  > `> [!NOTE]` सामान्य संदेश आणि टिपा

  > [!TIP]
  > `> [!TIP]` टिपा आणि उपयुक्त टिपा

  > [!IMPORTANT]
  > `> [!IMPORTANT]` महत्त्वाच्या टिपा आणि चिंता

  > [!WARNING]
  > `> [!WARNING]` जोखीम चेतावणी आणि नोट्स

  > [!CAUTION]
  > `> [!CAUTION]` धोका आणि अत्यंत जोखमीची चेतावणी

  ---

  ## कार्य सूची
  - [ ] हे एक अपूर्ण प्रवाह कार्य आहे
  - [x] हे पूर्ण झालेले स्ट्रीमिंग कार्य आहे
  - [X] हे पूर्ण झालेले स्ट्रीमिंग कार्य आहे (कॅपिटल X)

  ---

  1. पहिला आयटम ऑर्डर केला
     1. ऑर्डर केलेला आयटम एक
     2. उप आयटम दोन ऑर्डर केले
  2. दुसऱ्या टर्मची ऑर्डर दिली
  ## पत्रक
  | कार्य | राज्य | वेळापत्रक |
  | :--- | :---: | ---: |
  | एक कार्य | पूर्ण झाले | 100% |
  | कार्य २ | प्रगतीपथावर आहे | 50% |
  ## कोड ब्लॉक
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## चित्र
  ![डेमो चित्र](https://i-01.eu.org/demo-green.avif)