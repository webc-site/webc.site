mdContent: |
  # Document de présentation Markdown
  Il s'agit d'une démonstration du rendu en streaming.
  ## Style de base
  - **Gras** et *Italique*
  - ~~barré~~
  - `inline_code` code en ligne
  - [Site officiel des Nations Unies](https://un.org) Lien de démonstration
  ## Citations et listes
  > Il s’agit d’une citation sur une seule ligne.

  > Il s'agit d'une citation sur plusieurs lignes.
  > Un effet visuel pour afficher des références multilignes.

  - Premier article non commandé
    - Sous-élément un non ordonné
    - Sous-élément deux non ordonné
  - Deuxième article non commandé

  > [!NOTE]
  > `> [!NOTE]` Messages et notes généraux

  > [!TIP]
  > `> [!TIP]` Conseils et astuces utiles

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Conseils et préoccupations importants

  > [!WARNING]
  > `> [!WARNING]` Avertissements et remarques sur les risques

  > [!CAUTION]
  > `> [!CAUTION]` AVERTISSEMENT DE DANGER ET DE RISQUE EXTRÊME

  ---

  ## liste de tâches
  - [ ] Il s'agit d'une tâche de streaming inachevée
  - [x] Ceci est une tâche de streaming terminée
  - [X] Il s'agit d'une tâche de streaming terminée (X majuscule)

  ---

  1. Premier article commandé
     1. Article 1 commandé
     2. J'ai commandé le deuxième article
  2. Deuxième mandat ordonné
  ## feuille
  | Tâche | État | calendrier |
  | :--- | :---: | ---: |
  | Première tâche | Complété | 100% |
  | Tâche 2 | en cours | 50% |
  ## bloc de code
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
