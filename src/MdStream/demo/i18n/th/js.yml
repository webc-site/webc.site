mdContent: |
  # เอกสารการนำเสนอ Markdown
  นี่คือการสาธิต Streaming Rendering
  ## สไตล์พื้นฐาน
  - **ตัวหนา** และ *ตัวเอียง*
  - ~~ตีทะลุ~~
  - `inline_code` รหัสอินไลน์
  - [เว็บไซต์อย่างเป็นทางการของสหประชาชาติ](https://un.org) ลิงก์สาธิต
  ## คำพูดและรายการ
  > นี่คือคำพูดบรรทัดเดียว

  > นี่คือคำพูดหลายบรรทัด
  > เอฟเฟกต์ภาพสำหรับการแสดงการอ้างอิงหลายบรรทัด

  - รายการแรกที่ไม่ได้สั่งซื้อ
    - รายการย่อยที่ไม่เรียงลำดับหนึ่ง
    - รายการย่อยที่ไม่เรียงลำดับที่สอง
  - รายการที่สองที่ไม่ได้สั่งซื้อ

  > [!NOTE]
  > `> [!NOTE]` ข้อความและบันทึกทั่วไป

  > [!TIP]
  > `> [!TIP]` เคล็ดลับและเคล็ดลับที่เป็นประโยชน์

  > [!IMPORTANT]
  > `> [!IMPORTANT]` เคล็ดลับและข้อกังวลที่สำคัญ

  > [!WARNING]
  > `> [!WARNING]` คำเตือนและหมายเหตุเกี่ยวกับความเสี่ยง

  > [!CAUTION]
  > `> [!CAUTION]` คำเตือนอันตรายและความเสี่ยงร้ายแรง

  ---

  ## รายการงาน
  - [ ] นี่เป็นงานสตรีมมิ่งที่ยังไม่เสร็จ
  - [x] นี่เป็นงานสตรีมมิ่งที่เสร็จสมบูรณ์
  - [X] นี่เป็นงานสตรีมมิ่งที่เสร็จสมบูรณ์แล้ว (ตัวพิมพ์ใหญ่ X)

  ---

  1. สั่งสินค้าชิ้นแรก
     1. สั่งรายการที่ 1 ครับ
     2. สั่งรายการย่อยที่สอง
  2. สั่งระยะที่สอง
  ## แผ่น
  | งาน | สถานะ | กำหนดการ |
  | :--- | :---: | ---: |
  | ภารกิจที่หนึ่ง | สมบูรณ์ | 100% |
  | ภารกิจที่ 2 | อยู่ระหว่างดำเนินการ | 50% |
  ## บล็อกรหัส
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## รูปภาพ
