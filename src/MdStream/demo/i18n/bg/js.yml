  # Документ за представяне на Markdown
  Това е демонстрация на поточно изобразяване.
  ## Основен стил
  - **Удебелен шрифт** и *курсив*
  - ~~зачертано~~
  - `inline_code` вграден код
  - [Официален уебсайт на ООН](https://un.org) Демонстрация на връзка
  ## Цитати и списъци
  > Това е едноредов цитат.

  > Това е многоредов цитат.
  > Визуален ефект за показване на многоредови препратки.

  - Неподреден първи артикул
    - Неподреден подточка първа
    - Неподреден подточка две
  - Непоръчан втори артикул

  > [!NOTE]
  > `> [!NOTE]` Общи съобщения и бележки

  > [!TIP]
  > `> [!TIP]` Съвети и полезни съвети

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Важни съвети и проблеми

  > [!WARNING]
  > `> [!WARNING]` Предупреждения и бележки за риск

