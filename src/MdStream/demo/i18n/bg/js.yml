  ---

  ## списък със задачи
  - [ ] Това е незавършена задача за поточно предаване
  - [x] Това е завършена задача за поточно предаване
  - [X] Това е завършена задача за стрийминг (главно X)

  ---

  1. Поръчан първи артикул
     1. Поръчан артикул първи
     2. Наредена подточка втора
  2. Поръчан втори срок
  ## лист
  | Задача | състояние | график |
  | :--- | :---: | ---: |
  | Задача първа | Завършено | 100% |
  | Задача 2 | в ход | 50% |
