  # Prezentační dokument Markdown
  Toto je ukázka streamování vykreslování.
  ## Základní styl
  - **tučné** a *kurzíva*
  - ~~přeškrtnutí~~
  - `inline_code` vložený kód
  - [Oficiální stránky Organizace spojených národů](https://un.org) Ukázka odkazu
  ## Citáty a seznamy
  > Toto je jednořádková citace.

  > Toto je víceřádkový citát.
  > Vizuální efekt pro zobrazení víceřádkových odkazů.

  - Neobjednané první zboží
    - Neuspořádaná podpoložka jedna
    - Neuspořádaná podpoložka dvě
  - Neobjednaná druhá položka

  > [!NOTE]
  > `> [!NOTE]` Obecné zprávy a poznámky

  > [!TIP]
  > `> [!TIP]` Tipy a užitečné tipy

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Důležité tipy a obavy

  > [!WARNING]
  > `> [!WARNING]` Upozornění na rizika a poznámky

  > [!CAUTION]
  > `> [!CAUTION]` NEBEZPEČÍ A EXTRÉMNÍ RIZIKO VAROVÁNÍ

  ---

  ## seznam úkolů
  - [ ] Toto je nedokončený úkol streamování
  - [x] Toto je dokončený úkol streamování
  - [X] Toto je dokončený úkol streamování (velké X)

