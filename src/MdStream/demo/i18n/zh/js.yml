mdContent: |
  # Markdown 演示文档
  这是一个**流式渲染**的演示。
  ## 基础样式
  - **加粗** 和 *斜体*
  - ~~删除线~~
  - `inline_code` 行内代码
  - [联合国官网](https://un.org) 链接演示
  ## 引用与列表
  > 这是一个单行引用。

  > 这是一个多行引用。
  > 用于展示多行引用的视觉效果。

  - 无序第一项
    - 无序子项一
    - 无序子项二
  - 无序第二项

  > [!NOTE]
  > `> [!NOTE]` 常规消息与注意

  > [!TIP]
  > `> [!TIP]` 提示与实用小窍门

  > [!IMPORTANT]
  > `> [!IMPORTANT]` 重要提示与关注点

  > [!WARNING]
  > `> [!WARNING]` 风险警告与注意事项

  > [!CAUTION]
  > `> [!CAUTION]` 危险与极高风险警告

  ---

  ## 任务列表
  - [ ] 这是一个未完成的流式任务
  - [x] 这是一个已完成的流式任务
  - [X] 这是一个已完成的流式任务（大写X）

  ---

  1. 有序第一项
     1. 有序子项一
     2. 有序子项二
  2. 有序第二项
  ## 表格
  | 任务 | 状态 | 进度 |
  | :--- | :---: | ---: |
  | 任务一 | 已完成 | 100% |
  | 任务二 | 进行中 | 50% |
  ## 代码块
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
