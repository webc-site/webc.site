mdContent: |
  # マークダウンプレゼンテーションドキュメント
  これはストリーミング レンダリングのデモです。
  ## ベーシックスタイル
  - **太字**および*斜体*
  - ~~取り消し線~~
  - `inline_code` インライン コード
  - 【国連公式サイト】(/0) リンクデモンストレーション
  ## 引用とリスト
  > これは 1 行の引用です。

  > これは複数行の引用です。
  > 複数行の参照を表示するための視覚効果。

  - 注文されていない最初のアイテム
    - 順序付けされていないサブ項目 1
    - 順序のない副項目 2
  - 注文されていない 2 番目の項目

  > [!NOTE]
  > `> [!NOTE]` 一般的なメッセージと注意事項

  > [!TIP]
  > `> [!TIP]` ヒントと役立つヒント

  > [!IMPORTANT]
  > `> [!IMPORTANT]` 重要なヒントと懸念事項

  > [!WARNING]
  > `> [!WARNING]` リスク警告と注意事項

  > [!CAUTION]
  > `> [!CAUTION]` 危険および極度のリスクに関する警告

  ---

  ## タスクリスト
  - [ ] これは未完了のストリーミング タスクです
  - [x] これは完了したストリーミング タスクです
  - [X] これは完了したストリーミング タスクです (大文字の X)

  ---

  1. 最初に注文した商品
     1. 注文した商品その１
     2. 注文されたサブアイテム 2
  2. 第二期を発注しました
  ## シート
  | タスク | 州 | スケジュール |
  | :--- | :---: | ---: |
  | タスク 1 | 完了しました | 100% |
  | タスク 2 | 進行中 | 50% |
  ## コードブロック
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## 写真
