  ## daftar tugas
  - [ ] Ini adalah tugas streaming yang belum selesai
  - [x] Ini adalah tugas streaming yang selesai
  - [X] Ini adalah tugas streaming yang telah selesai (huruf kapital X)

  ---

  1. Barang pertama yang dipesan
     1. Barang yang dipesan satu
     2. Memesan subitem dua
  2. Memesan periode kedua
