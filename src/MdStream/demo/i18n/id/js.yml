  # Dokumen presentasi penurunan harga
  Ini adalah demonstrasi Streaming Rendering.
  ## Gaya dasar
  - **Tebal** dan *Miring*
  - ~~coret~~
  - `inline_code` kode sebaris
  - [Situs web resmi Perserikatan Bangsa-Bangsa](https://un.org) Tautan demonstrasi
  ## Kutipan dan Daftar
  > Ini adalah kutipan satu baris.

  > Ini adalah kutipan multi-baris.
  > Efek visual untuk menampilkan referensi multi-baris.

  - Item pertama yang tidak diurutkan
    - Subitem satu tidak berurutan
    - Subitem dua tidak berurutan
  - Item kedua tidak berurutan

  > [!NOTE]
  > `> [!NOTE]` Pesan dan catatan umum

  > [!TIP]
  > `> [!TIP]` Kiat dan kiat bermanfaat

