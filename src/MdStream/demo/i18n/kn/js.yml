mdContent: |
  # ಮಾರ್ಕ್‌ಡೌನ್ ಪ್ರಸ್ತುತಿ ಡಾಕ್ಯುಮೆಂಟ್
  ಇದು ಸ್ಟ್ರೀಮಿಂಗ್ ರೆಂಡರಿಂಗ್‌ನ ಪ್ರದರ್ಶನವಾಗಿದೆ.
  ## ಮೂಲ ಶೈಲಿ
  - ** ದಪ್ಪ** ಮತ್ತು *ಇಟಾಲಿಕ್*
  - ~~ಸ್ಟ್ರೈಕ್ಥ್ರೂ~~
  - `inline_code` ಇನ್‌ಲೈನ್ ಕೋಡ್
  - [ಯುನೈಟೆಡ್ ನೇಷನ್ಸ್ ಅಧಿಕೃತ ವೆಬ್‌ಸೈಟ್](https://un.org) ಲಿಂಕ್ ಪ್ರದರ್ಶನ
  ## ಉಲ್ಲೇಖಗಳು ಮತ್ತು ಪಟ್ಟಿಗಳು
  > ಇದು ಒಂದೇ ಸಾಲಿನ ಉಲ್ಲೇಖವಾಗಿದೆ.

  > ಇದು ಬಹು-ಸಾಲಿನ ಉಲ್ಲೇಖವಾಗಿದೆ.
  > ಬಹು-ಸಾಲಿನ ಉಲ್ಲೇಖಗಳನ್ನು ಪ್ರದರ್ಶಿಸಲು ಒಂದು ದೃಶ್ಯ ಪರಿಣಾಮ.

  - ಮೊದಲ ಐಟಂ ಅನ್ನು ಆರ್ಡರ್ ಮಾಡಲಾಗಿಲ್ಲ
    - ಉಪವಿಭಾಗ ಒಂದು
    - ಉಪವಿಭಾಗ ಎರಡು
  - ಎರಡನೇ ಐಟಂ ಅನ್ನು ಆದೇಶಿಸಲಾಗಿಲ್ಲ

  > [!NOTE]
  > `> [!NOTE]` ಸಾಮಾನ್ಯ ಸಂದೇಶಗಳು ಮತ್ತು ಟಿಪ್ಪಣಿಗಳು

  > [!TIP]
  > `> [!TIP]` ಸಲಹೆಗಳು ಮತ್ತು ಸಹಾಯಕವಾದ ಸಲಹೆಗಳು

  > [!IMPORTANT]
  > `> [!IMPORTANT]` ಪ್ರಮುಖ ಸಲಹೆಗಳು ಮತ್ತು ಕಾಳಜಿಗಳು

  > [!WARNING]
  > `> [!WARNING]` ಅಪಾಯದ ಎಚ್ಚರಿಕೆಗಳು ಮತ್ತು ಟಿಪ್ಪಣಿಗಳು

  > [!CAUTION]
  > `> [!CAUTION]` ಅಪಾಯ ಮತ್ತು ತೀವ್ರ ಅಪಾಯದ ಎಚ್ಚರಿಕೆ

  ---

  ## ಕಾರ್ಯ ಪಟ್ಟಿ
  - [ ] ಇದು ಅಪೂರ್ಣ ಸ್ಟ್ರೀಮಿಂಗ್ ಕಾರ್ಯವಾಗಿದೆ
  - [x] ಇದು ಪೂರ್ಣಗೊಂಡ ಸ್ಟ್ರೀಮಿಂಗ್ ಕಾರ್ಯವಾಗಿದೆ
  - [X] ಇದು ಪೂರ್ಣಗೊಂಡ ಸ್ಟ್ರೀಮಿಂಗ್ ಕಾರ್ಯವಾಗಿದೆ (ಕ್ಯಾಪಿಟಲ್ ಎಕ್ಸ್)

  ---

  1. ಮೊದಲ ಐಟಂ ಅನ್ನು ಆರ್ಡರ್ ಮಾಡಲಾಗಿದೆ
     1. ಒಂದು ಐಟಂ ಅನ್ನು ಆದೇಶಿಸಲಾಗಿದೆ
     2. ಎರಡು ಉಪವಿಭಾಗವನ್ನು ಆದೇಶಿಸಲಾಗಿದೆ
  2. ಎರಡನೇ ಅವಧಿಗೆ ಆದೇಶ ನೀಡಿದೆ
  ## ಹಾಳೆ
  | ಕಾರ್ಯ | ರಾಜ್ಯ | ವೇಳಾಪಟ್ಟಿ |
  | :--- | :---: | ---: |
  | ಕಾರ್ಯ ಒಂದು | ಪೂರ್ಣಗೊಂಡಿದೆ | 100% |
  | ಕಾರ್ಯ 2 | ಪ್ರಗತಿಯಲ್ಲಿದೆ | 50% |
  ## ಕೋಡ್ ಬ್ಲಾಕ್
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
