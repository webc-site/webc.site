  ## Aufgabenliste
  - [ ] Dies ist eine noch nicht abgeschlossene Streaming-Aufgabe
  - [x] Dies ist eine abgeschlossene Streaming-Aufgabe
  - [X] Dies ist eine abgeschlossene Streaming-Aufgabe (Großbuchstaben X).

  ---

  1. Habe den ersten Artikel bestellt
     1. Artikel eins bestellt
     2. Unterpunkt zwei bestellt
  2. Zweite Amtszeit bestellt
  ## Blatt
  | Aufgabe | Zustand | Zeitplan |
  | :--- | :---: | ---: |
  | Aufgabe eins | Vollendet | 100% |
  | Aufgabe 2 | im Gange | 50% |
  ## Codeblock
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
