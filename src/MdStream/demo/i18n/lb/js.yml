  ---

  ## Aufgab Lëscht
  - [ ] Dëst ass eng ongeschloss Streaming Aufgab
  - [x] Dëst ass eng ofgeschloss Streaming Aufgab
  - [X] Dëst ass eng ofgeschloss Streaming Aufgab (Haaptstad X)

  ---

  1. Éischten Artikel bestallt
     1. Artikel 1 bestallt
     2. Bestallt Ënnerartikel zwee
  2. Bestallt zweete Begrëff
  ## Blat
  | Aufgab | Staat | Zäitplang |
  | :--- | :---: | ---: |
  | Aufgab eent | Ofgeschloss | 100% |
  | Aufgab 2 | a Beaarbechtung | 50% |
