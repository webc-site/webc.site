mdContent: |
  # Έγγραφο παρουσίασης Markdown
  Αυτή είναι μια επίδειξη της απόδοσης ροής.
  ## Βασικό στυλ
  - **Έντονη** και *Πλάγια*
  - ~~ χτύπημα~~
  - `inline_code` ενσωματωμένος κώδικας
  - [Επίσημος ιστότοπος των Ηνωμένων Εθνών](https://un.org) Επίδειξη συνδέσμου
  ## Αποσπάσματα και Λίστες
  > Αυτό είναι ένα απόσπασμα μιας γραμμής.

  > Αυτό είναι ένα απόσπασμα πολλών γραμμών.
  > Ένα οπτικό εφέ για την εμφάνιση αναφορών πολλαπλών γραμμών.

  - Χωρίς παραγγελία πρώτο στοιχείο
    - Απαραγγελία υποκατηγορία πρώτο
    - Απαραγγελία υποκατηγορία δύο
  - Δεύτερο στοιχείο χωρίς παραγγελία

  > [!NOTE]
  > `> [!NOTE]` Γενικά μηνύματα και σημειώσεις

  > [!TIP]
  > `> [!TIP]` Συμβουλές και χρήσιμες συμβουλές

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Σημαντικές συμβουλές και ανησυχίες

  > [!WARNING]
  > `> [!WARNING]` Προειδοποιήσεις και σημειώσεις κινδύνου

  > [!CAUTION]
  > `> [!CAUTION]` ΠΡΟΕΙΔΟΠΟΙΗΣΗ ΚΙΝΔΥΝΟΥ ΚΑΙ ΑΚΡΑΤΩΝ ΚΙΝΔΥΝΩΝ

  ---

  ## λίστα εργασιών
  - [ ] Αυτή είναι μια ημιτελής εργασία ροής
  - [x] Αυτή είναι μια ολοκληρωμένη εργασία ροής
  - [X] Αυτή είναι μια ολοκληρωμένη εργασία ροής (κεφαλαίο X)

  ---

  1. Παραγγελία πρώτου είδους
     1. Παρήγγειλε το πρώτο
     2. Παραγγελία υποκατηγορίας δύο
  2. Διέταξε δεύτερη θητεία
  ## σεντόνι
  | Εργο | κατάσταση | πρόγραμμα |
  | :--- | :---: | ---: |
  | Πρώτη εργασία | Ολοκληρώθηκε το | 100% |
  | Εργασία 2 | σε εξέλιξη | 50% |
  ## μπλοκ κωδικών
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
