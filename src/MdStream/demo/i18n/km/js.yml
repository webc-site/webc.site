mdContent: |
  # ឯកសារបង្ហាញ Markdown
  នេះ​ជា​ការ​បង្ហាញ​អំពី​ការ​បង្ហាញ​ការ​ផ្សាយ។
  ## រចនាប័ទ្មមូលដ្ឋាន
  - **ដិត** និង *ទ្រេត*
  - ~~ វាយលុក ~~
  - `inline_code` កូដក្នុងជួរ
  - [គេហទំព័រផ្លូវការរបស់អង្គការសហប្រជាជាតិ](https://un.org) Link demonstration
  ## សម្រង់និងបញ្ជី
  > នេះជាសម្រង់មួយជួរ។

  > នេះជាសម្រង់ពហុជួរ។
  > បែបផែនមើលឃើញសម្រាប់បង្ហាញឯកសារយោងពហុជួរ។

  - ធាតុដំបូងដែលមិនបានបញ្ជាទិញ
    - ធាតុរងដែលមិនបានបញ្ជាទិញមួយ។
    - ធាតុរងដែលមិនមានលំដាប់ទីពីរ
  - ធាតុទីពីរដែលមិនបានបញ្ជាទិញ

  > [!NOTE]
  > `> [!NOTE]` សារ និងកំណត់ចំណាំទូទៅ

  > [!TIP]
  > `> [!TIP]` គន្លឹះ និងគន្លឹះមានប្រយោជន៍

  > [!IMPORTANT]
  > `> [!IMPORTANT]`គន្លឹះ និងកង្វល់សំខាន់ៗ

  > [!WARNING]
  > `> [!WARNING]`ការព្រមាន និងកំណត់ចំណាំហានិភ័យ

  > [!CAUTION]
  > `> [!CAUTION]` ការព្រមានអំពីគ្រោះថ្នាក់ និងហានិភ័យធ្ងន់ធ្ងរ

  ---

  ## បញ្ជីកិច្ចការ
  - [ ] នេះ​ជា​កិច្ចការ​ផ្សាយ​មិន​ទាន់​ចប់
  - [x] នេះ​ជា​កិច្ចការ​ផ្សាយ​ដែល​បាន​បញ្ចប់
  - [X] នេះ​ជា​កិច្ចការ​ចាក់​ផ្សាយ​ដែល​បាន​បញ្ចប់ (រាជធានី X)

  ---

  1. បានបញ្ជាទិញធាតុដំបូង
     1. បានបញ្ជាទិញធាតុមួយ។
     2. បាន​បញ្ជា​ទិញ​ធាតុ​រង​ពីរ
  2. លំដាប់ទីពីរ
  ## សន្លឹក
  | កិច្ចការ | រដ្ឋ | កាលវិភាគ |
  | :--- | :---: | ---: |
  | កិច្ចការមួយ។ | បានបញ្ចប់ | 100% |
  | កិច្ចការទី 2 | កំពុងដំណើរការ | 50% |
  ## ប្លុកកូដ
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## រូបភាព
  ![រូបភាពសាកល្បង](https://i-01.eu.org/demo-green.avif)