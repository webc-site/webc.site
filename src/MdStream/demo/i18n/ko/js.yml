mdContent: |
  # 마크다운 프레젠테이션 문서
  스트리밍 렌더링의 데모입니다.
  ## 기본 스타일
  - **굵게** 및 *기울임꼴*
  - ~~취소선~~
  - `inline_code` 인라인 코드
  - [유엔 공식 홈페이지](https://un.org) 링크 시연
  ## 견적 및 목록
  > 이것은 한 줄짜리 인용문입니다.

  > 이것은 여러 줄의 인용문입니다.
  > 여러 줄 참조를 표시하기 위한 시각적 효과입니다.

  - 주문되지 않은 첫 번째 항목
    - 순서가 지정되지 않은 하위 항목 1
    - 순서가 지정되지 않은 하위 항목 2
  - 주문되지 않은 두 번째 항목

  > [!NOTE]
  > `> [!NOTE]` 일반 메시지 및 메모

  > [!TIP]
  > `> [!TIP]` 팁 및 유용한 팁

  > [!IMPORTANT]
  > `> [!IMPORTANT]` 중요한 도움말 및 우려 사항

  > [!WARNING]
  > `> [!WARNING]` 위험 경고 및 참고 사항

  > [!CAUTION]
  > `> [!CAUTION]` 위험 및 극도의 위험 경고

  ---

  ## 작업 목록
  - [ ] 완료되지 않은 스트리밍 작업입니다.
  - [x] 완료된 스트리밍 작업입니다.
  - [X] 완료된 스트리밍 작업입니다(대문자 X).

  ---

  1. 첫 번째 항목 주문
     1. 주문한 상품 1개
     2. 하위 항목 2를 주문함
  2. 2학기 주문
  ## 시트
  | 일 | 상태 | 일정 |
  | :--- | :---: | ---: |
  | 작업 1 | 완전한 | 100% |
  | 작업 2 | 진행 중 | 50% |
  ## 코드 블록
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## 그림
  ![데모 사진](https://i-01.eu.org/demo-green.avif)