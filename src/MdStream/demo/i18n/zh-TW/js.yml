mdContent: |
  # Markdown 示範文檔
  這是一個**流式渲染**的演示。
  ## 基礎樣式
  - **加粗** 和 *斜體*
  - ~~刪除線~~
  - `inline_code` 行內程式碼
  - [聯合國官網](https://un.org) 連結演示
  ## 引用與列表
  > 這是一個單行引用。

  > 這是一個多行引用。
  > 用於展示多行引用的視覺效果。

  - 無序第一項
    - 無序子項一
    - 無序子項二
  - 無序第二項

  > [!NOTE]
  > `> [!NOTE]` 常規訊息與注意

  > [!TIP]
  > `> [!TIP]` 提示與實用小撇步

  > [!IMPORTANT]
  > `> [!IMPORTANT]` 重要提示與關注點

  > [!WARNING]
  > `> [!WARNING]` 風險警告與注意事項

  > [!CAUTION]
  > `> [!CAUTION]` 危險與極高風險警告

  ---

  ## 任務清單
  - [ ] 這是一個未完成的串流任務
  - [x] 這是一個已完成的串流任務
  - [X] 這是一個已完成的串流任務（大寫X）

  ---

  1. 有序第一項
     1. 有序子項一
     2. 有序子項二
  2. 有序第二項
  ## 表格
  | 任務 | 狀態 | 進度 |
  | :--- | :---: | ---: |
  | 任務一 | 已完成 | 100% |
  | 任務二 | 進行中 | 50% |
  ## 程式碼區塊
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
  ## 圖片
  ![示範圖片](https://i-01.eu.org/demo-green.avif)