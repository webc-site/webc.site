mdContent: |
  # Прэзентацыйны дакумент разметкі
  Гэта дэманстрацыя Streaming Rendering.
  ## Асноўны стыль
  - **Тлусты шрыфт** і *Курсіў*
  - ~~закрэслена~~
  - `inline_code` убудаваны код
  - [Афіцыйны сайт Арганізацыі Аб'яднаных Нацый](https://un.org) Дэманстрацыя спасылкі
  ## Цытаты і спісы
  > Гэта аднарадковая цытата.

  > Гэта шматрадковая цытата.
  > Візуальны эфект для адлюстравання шматрадковых спасылак.

  - Неўпарадкаваны першы элемент
    - Неўпарадкаваны падпункт першы
    - Неўпарадкаваны падпункт другі
  - Неўпарадкаваны другі прадмет

  > [!NOTE]
  > `> [!NOTE]` Агульныя паведамленні і нататкі

  > [!TIP]
  > `> [!TIP]` Парады і карысныя парады

  > [!IMPORTANT]
  > `> [!IMPORTANT]` Важныя парады і праблемы

  > [!WARNING]
  > `> [!WARNING]` Папярэджанні і заўвагі аб рызыцы

  > [!CAUTION]
  > `> [!CAUTION]` ПАПЯРЭДЖАННЕ АБ НЕБЯСПЕКІ І НАДЗВЫЧАЙНАЙ РЫЗЫКЕ

  ---

  ## спіс задач
  - [ ] Гэта незавершаная задача трансляцыі
  - [x] Гэта выкананая задача трансляцыі
  - [X] Гэта выкананая задача трансляцыі (X з вялікай літары)

  ---

  1. Заказаў першы тавар
     1. Заказаў тавар першы
     2. Загадаў падпункт другі
  2. Загадаў другі тэрмін
  ## ліст
  | Задача | стан | графік |
  | :--- | :---: | ---: |
  | Заданне першае | Завершана | 100% |
  | Заданне 2 | у працэсе | 50% |
  ## кодавы блок
  ```js
  const hello = () => {
    console.log("Hello, WebC!");
  };
  ```
