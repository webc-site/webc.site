language: ภาษา
os: ระบบ
about: เกี่ยวกับ
jsInfo: JavaScript เป็นภาษาสคริปต์ที่ใช้กันอย่างแพร่หลายในการพัฒนาเว็บฝั่งไคลเอ็นต์
rsInfo: Rust เป็นภาษาโปรแกรมระบบที่เน้นเรื่องความปลอดภัย ความเร็ว และการทำงานพร้อมกัน
pyInfo: Python เป็นภาษาโปรแกรมคอมพิวเตอร์ที่มีการตีความเชิงวัตถุ
macInfo: macOS เป็นระบบปฏิบัติการกราฟิกบน Unix ที่พัฒนาโดย Apple
winInfo: Windows เป็นระบบปฏิบัติการคอมพิวเตอร์ส่วนบุคคลที่ใช้กันอย่างแพร่หลายซึ่งพัฒนาโดย Microsoft Corporation
aboutInfo: เรามุ่งมั่นที่จะพัฒนาส่วนประกอบฟรอนต์เอนด์โอเพ่นซอร์สคุณภาพสูง และคุณสามารถเข้าร่วมได้