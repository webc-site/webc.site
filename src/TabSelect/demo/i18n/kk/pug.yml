language: тіл
os: жүйесі
about: туралы
jsInfo: JavaScript – клиенттік веб-әзірлеуде кеңінен қолданылатын сценарий тілі.
rsInfo: Rust – қауіпсіздікке, жылдамдыққа және параллельдікке бағытталған жүйелік бағдарламалау тілі.
pyInfo: Python – объектіге бағытталған, түсіндірілетін компьютерлік бағдарламалау тілі.
macInfo: macOS — Apple әзірлеген Unix негізіндегі графикалық операциялық жүйе.
winInfo: Windows — Microsoft корпорациясы әзірлеген кең таралған дербес компьютердің операциялық жүйесі.
aboutInfo: Біз жоғары сапалы ашық бастапқы интерфейс құрамдастарын әзірлеуге дайынбыз және қатысуға қош келдіңіз.