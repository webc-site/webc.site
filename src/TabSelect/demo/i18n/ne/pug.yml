language: भाषा
os: प्रणाली
about: बारेमा
jsInfo: JavaScript क्लाइन्ट-साइड वेब विकासमा व्यापक रूपमा प्रयोग हुने स्क्रिप्टिङ भाषा हो।
rsInfo: Rust सुरक्षा, गति, र concurrency मा केन्द्रित प्रणाली प्रोग्रामिङ भाषा हो।
pyInfo: पाइथन एक वस्तु-उन्मुख, व्याख्या गरिएको कम्प्युटर प्रोग्रामिङ भाषा हो।
macInfo: macOS एप्पल द्वारा विकसित युनिक्स-आधारित ग्राफिकल अपरेटिङ सिस्टम हो।
winInfo: Windows माइक्रोसफ्ट कर्पोरेशन द्वारा विकसित एक व्यापक रूपमा प्रयोग गरिएको व्यक्तिगत कम्प्युटर अपरेटिङ सिस्टम हो।
aboutInfo: हामी उच्च गुणस्तरको खुला स्रोत फ्रन्ट-एन्ड कम्पोनेन्टहरू विकास गर्न प्रतिबद्ध छौं, र तपाईंलाई सहभागी हुन स्वागत छ।