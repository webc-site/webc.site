jsInfo: JavaScript е јазик за скриптирање широко користен во веб-развојот од страна на клиентот.
rsInfo: Rust е системски програмски јазик фокусиран на безбедност, брзина и истовремено.
pyInfo: Python е објектно-ориентиран, интерпретиран компјутерски програмски јазик.
macInfo: macOS е графички оперативен систем базиран на Unix развиен од Apple.
winInfo: Виндоус е широко користен оперативен систем за персонален компјутер развиен од корпорацијата Мајкрософт.
aboutInfo: Посветени сме на развој на висококвалитетни предни компоненти со отворен код и добредојдени сте да учествувате.