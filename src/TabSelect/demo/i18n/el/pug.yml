language: γλώσσα
os: σύστημα
about: για
jsInfo: Η JavaScript είναι μια γλώσσα δέσμης ενεργειών που χρησιμοποιείται ευρέως στην ανάπτυξη ιστού από την πλευρά του πελάτη.
rsInfo: Η Rust είναι μια γλώσσα προγραμματισμού συστημάτων που επικεντρώνεται στην ασφάλεια, την ταχύτητα και τη συγχρονικότητα.
pyInfo: Η Python είναι μια αντικειμενοστραφή, ερμηνευμένη γλώσσα προγραμματισμού υπολογιστών.
macInfo: Το macOS είναι ένα γραφικό λειτουργικό σύστημα βασισμένο σε Unix που αναπτύχθηκε από την Apple.
winInfo: Τα Windows είναι ένα ευρέως χρησιμοποιούμενο λειτουργικό σύστημα προσωπικών υπολογιστών που αναπτύχθηκε από τη Microsoft Corporation.
aboutInfo: Δεσμευόμαστε να αναπτύξουμε υψηλής ποιότητας στοιχεία ανοιχτού κώδικα front-end και είστε ευπρόσδεκτοι να συμμετάσχετε.