language: భాష
os: వ్యవస్థ
about: గురించి
jsInfo: జావాస్క్రిప్ట్ అనేది క్లయింట్ వైపు వెబ్ అభివృద్ధిలో విస్తృతంగా ఉపయోగించే స్క్రిప్టింగ్ భాష.
rsInfo: రస్ట్ అనేది సేఫ్టీ, స్పీడ్ మరియు కరెన్సీపై దృష్టి సారించే సిస్టమ్స్ ప్రోగ్రామింగ్ లాంగ్వేజ్.
pyInfo: పైథాన్ అనేది ఆబ్జెక్ట్-ఓరియెంటెడ్, ఇంటర్‌ప్రెటెడ్ కంప్యూటర్ ప్రోగ్రామింగ్ లాంగ్వేజ్.
macInfo: macOS అనేది Apple చే అభివృద్ధి చేయబడిన Unix-ఆధారిత గ్రాఫికల్ ఆపరేటింగ్ సిస్టమ్.
winInfo: విండోస్ అనేది మైక్రోసాఫ్ట్ కార్పొరేషన్ అభివృద్ధి చేసిన విస్తృతంగా ఉపయోగించే వ్యక్తిగత కంప్యూటర్ ఆపరేటింగ్ సిస్టమ్.
aboutInfo: మేము అధిక-నాణ్యత ఓపెన్ సోర్స్ ఫ్రంట్-ఎండ్ భాగాలను అభివృద్ధి చేయడానికి కట్టుబడి ఉన్నాము మరియు మీరు పాల్గొనడానికి స్వాగతం.