language: ಭಾಷೆ
os: ವ್ಯವಸ್ಥೆ
about: ಸುಮಾರು
jsInfo: ಜಾವಾಸ್ಕ್ರಿಪ್ಟ್ ಕ್ಲೈಂಟ್-ಸೈಡ್ ವೆಬ್ ಅಭಿವೃದ್ಧಿಯಲ್ಲಿ ವ್ಯಾಪಕವಾಗಿ ಬಳಸಲಾಗುವ ಸ್ಕ್ರಿಪ್ಟಿಂಗ್ ಭಾಷೆಯಾಗಿದೆ.
rsInfo: ರಸ್ಟ್ ಎನ್ನುವುದು ಸುರಕ್ಷತೆ, ವೇಗ ಮತ್ತು ಏಕಕಾಲಿಕತೆಯ ಮೇಲೆ ಕೇಂದ್ರೀಕರಿಸಿದ ಸಿಸ್ಟಮ್ಸ್ ಪ್ರೋಗ್ರಾಮಿಂಗ್ ಭಾಷೆಯಾಗಿದೆ.
pyInfo: ಪೈಥಾನ್ ಒಂದು ವಸ್ತು-ಆಧಾರಿತ, ವ್ಯಾಖ್ಯಾನಿಸಲಾದ ಕಂಪ್ಯೂಟರ್ ಪ್ರೋಗ್ರಾಮಿಂಗ್ ಭಾಷೆಯಾಗಿದೆ.
macInfo: ಮ್ಯಾಕೋಸ್ ಯುನಿಕ್ಸ್ ಆಧಾರಿತ ಗ್ರಾಫಿಕಲ್ ಆಪರೇಟಿಂಗ್ ಸಿಸ್ಟಮ್ ಆಗಿದ್ದು ಆಪಲ್ ಅಭಿವೃದ್ಧಿಪಡಿಸಿದೆ.
winInfo: ವಿಂಡೋಸ್ ಮೈಕ್ರೋಸಾಫ್ಟ್ ಕಾರ್ಪೊರೇಷನ್ ಅಭಿವೃದ್ಧಿಪಡಿಸಿದ ವ್ಯಾಪಕವಾಗಿ ಬಳಸಲಾಗುವ ವೈಯಕ್ತಿಕ ಕಂಪ್ಯೂಟರ್ ಆಪರೇಟಿಂಗ್ ಸಿಸ್ಟಮ್ ಆಗಿದೆ.
aboutInfo: ಉತ್ತಮ ಗುಣಮಟ್ಟದ ಮುಕ್ತ ಮೂಲ ಫ್ರಂಟ್-ಎಂಡ್ ಘಟಕಗಳನ್ನು ಅಭಿವೃದ್ಧಿಪಡಿಸಲು ನಾವು ಬದ್ಧರಾಗಿದ್ದೇವೆ ಮತ್ತು ಭಾಗವಹಿಸಲು ನಿಮಗೆ ಸ್ವಾಗತ.