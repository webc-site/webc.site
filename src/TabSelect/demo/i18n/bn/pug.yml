language: ভাষা
os: সিস্টেম
about: সম্পর্কে
jsInfo: জাভাস্ক্রিপ্ট একটি স্ক্রিপ্টিং ভাষা যা ক্লায়েন্ট-সাইড ওয়েব ডেভেলপমেন্টে ব্যাপকভাবে ব্যবহৃত হয়।
rsInfo: মরিচা হল একটি সিস্টেম প্রোগ্রামিং ল্যাঙ্গুয়েজ যা নিরাপত্তা, গতি এবং সঙ্গতির উপর দৃষ্টি নিবদ্ধ করে।
pyInfo: পাইথন একটি অবজেক্ট-ভিত্তিক, ব্যাখ্যা করা কম্পিউটার প্রোগ্রামিং ভাষা।
macInfo: macOS হল একটি ইউনিক্স-ভিত্তিক গ্রাফিকাল অপারেটিং সিস্টেম যা অ্যাপল দ্বারা তৈরি করা হয়েছে।
winInfo: উইন্ডোজ মাইক্রোসফ্ট কর্পোরেশন দ্বারা বিকাশিত একটি বহুল ব্যবহৃত ব্যক্তিগত কম্পিউটার অপারেটিং সিস্টেম।
aboutInfo: আমরা উচ্চ-মানের ওপেন সোর্স ফ্রন্ট-এন্ড উপাদানগুলি বিকাশ করতে প্রতিশ্রুতিবদ্ধ, এবং আপনাকে অংশগ্রহণ করতে স্বাগত জানাই৷