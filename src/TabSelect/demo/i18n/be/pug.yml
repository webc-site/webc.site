language: мове
os: сістэма
about: аб
jsInfo: JavaScript - гэта мова сцэнарыяў, якая шырока выкарыстоўваецца ў вэб-распрацоўцы на баку кліента.
rsInfo: Rust - гэта мова сістэмнага праграмавання, арыентаваная на бяспеку, хуткасць і паралелізм.
pyInfo: Python - гэта аб'ектна-арыентаваная, інтэрпрэтаваная мова праграмавання.
macInfo: macOS - гэта графічная аперацыйная сістэма на базе Unix, распрацаваная Apple.
winInfo: Windows - гэта шырока распаўсюджаная аперацыйная сістэма для персанальных кампутараў, распрацаваная карпарацыяй Microsoft.
aboutInfo: Мы імкнемся да распрацоўкі высакаякасных інтэрфейсных кампанентаў з адкрытым зыходным кодам, і вы можаце прыняць удзел.