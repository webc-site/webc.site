jsInfo: JavaScript е скриптов език, широко използван в уеб разработката от страна на клиента.
rsInfo: Rust е език за системно програмиране, фокусиран върху безопасността, скоростта и паралелността.
pyInfo: Python е обектно-ориентиран, интерпретиран език за компютърно програмиране.
macInfo: macOS е базирана на Unix графична операционна система, разработена от Apple.
winInfo: Windows е широко използвана операционна система за персонални компютри, разработена от Microsoft Corporation.
aboutInfo: Поели сме ангажимент да разработваме висококачествени компоненти за предния край с отворен код и сте добре дошли да участвате.