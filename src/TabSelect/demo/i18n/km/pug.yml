language: бһ—бһ¶бһҹбһ¶
os: бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’
about: бһўбҹҶбһ–бһё
jsInfo: JavaScript бһӮбһәбһҮбһ¶бһ—бһ¶бһҹбһ¶бһҹбҹ’бһӮбҹ’бһҡбһёбһ”бһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҷбҹүбһ¶бһ„бһ‘бһјбһӣбҹҶбһ‘бһјбһӣбһ¶бһҷбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚбһӮбҹҒбһ бһ‘бҹҶбһ–бҹҗбһҡбһҡбһ”бһҹбҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“бҹ”
rsInfo: Rust бһӮбһәбһҮбһ¶вҖӢбһ—бһ¶бһҹбһ¶вҖӢбһҹбһҡбһҹбҹҒбһҡвҖӢбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёвҖӢбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’вҖӢбһҠбҹӮбһӣвҖӢбһ•бҹ’бһҸбҹ„бһҸвҖӢбһӣбһҫвҖӢбһҹбһ»бһңбһҸбҹ’бһҗбһ·бһ—бһ¶бһ– бһӣбҹ’бһ”бһҝбһ“ бһ“бһ·бһ„вҖӢбһҖбһ¶бһҡвҖӢбһҹбҹ’бһҡбһ”бһӮбҹ’бһ“бһ¶бҹ”
pyInfo: Python бһӮбһәбһҮбһ¶бһ—бһ¶бһҹбһ¶бһҹбһҡбһҹбҹҒбһҡбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһҠбҹӮбһӣбһҸбһҳбҹ’бһҡбһ„бҹӢбһ‘бһ·бһҹбһңбһҸбҹ’бһҗбһ»бҹ”
macInfo: macOS бһӮбһәбһҮбһ¶бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҖбҹ’бһҡбһ¶бһ бҹ’бһңбһ·бһҖбһҠбҹӮбһӣбһҳбһ¶бһ“бһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“бһӣбһҫ Unix бһҠбҹӮбһӣбһ”бһ„бҹ’бһҖбһҫбһҸбһЎбһҫбһ„бһҠбҹ„бһҷ Apple бҹ”
winInfo: бһңбһёбһ“бһҠбһјбһӮбһәбһҮбһ¶бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҖбһ»бҹҶбһ–бҹ’бһҷбһјбһ‘бҹҗбһҡбһ•бҹ’бһ‘бһ¶бһӣбҹӢбһҒбҹ’бһӣбһҪбһ“бһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҷбҹүбһ¶бһ„бһ‘бһјбһӣбҹҶбһ‘бһјбһӣбһ¶бһҷбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бһ„бҹ’бһҖбһҫбһҸбһЎбһҫбһ„бһҠбҹ„бһҷбһҹбһ¶бһҮбһёбһңбһҖбһҳбҹ’бһҳ Microsoft бҹ”
aboutInfo: бһҷбһҫбһ„бһ”бҹ’бһҠбҹҒбһҮбҹ’бһүбһ¶бһ…бһ·бһҸбҹ’бһҸбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚбһҹбһҳбһ¶бһҹбһ’бһ¶бһҸбһ»бһҳбһ»бһҒбһ”бҹ’бһҡбһ—бһ–бһ”бһҫбһҖбһ…бҹҶбһ бһҠбҹӮбһӣбһҳбһ¶бһ“бһӮбһ»бһҺбһ—бһ¶бһ–бһҒбҹ’бһ–бһҹбҹӢ бһ бһҫбһҷбһўбҹ’бһ“бһҖбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһҹбҹ’бһңбһ¶бһӮбһҳбһ“бҹҚбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһ…бһјбһӣбһҡбһҪбһҳбҹ”