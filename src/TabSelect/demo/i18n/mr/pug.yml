language: भाषा
os: प्रणाली
about: बद्दल
jsInfo: JavaScript ही एक स्क्रिप्टिंग भाषा आहे जी क्लायंट-साइड वेब डेव्हलपमेंटमध्ये मोठ्या प्रमाणावर वापरली जाते.
rsInfo: रस्ट ही एक सिस्टम प्रोग्रामिंग भाषा आहे जी सुरक्षितता, वेग आणि एकरूपतेवर केंद्रित आहे.
pyInfo: पायथन ही एक ऑब्जेक्ट-ओरिएंटेड, व्याख्या केलेली संगणक प्रोग्रामिंग भाषा आहे.
macInfo: macOS ही Apple ने विकसित केलेली युनिक्स-आधारित ग्राफिकल ऑपरेटिंग सिस्टम आहे.
winInfo: विंडोज ही मायक्रोसॉफ्ट कॉर्पोरेशनने विकसित केलेली पर्सनल कॉम्प्युटर ऑपरेटिंग सिस्टीम आहे.
aboutInfo: आम्ही उच्च-गुणवत्तेचे ओपन सोर्स फ्रंट-एंड घटक विकसित करण्यासाठी वचनबद्ध आहोत आणि सहभागी होण्यासाठी तुमचे स्वागत आहे.