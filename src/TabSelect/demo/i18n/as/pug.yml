aboutInfo: আমি উচ্চমানৰ মুক্ত উৎস ফ্ৰন্ট-এণ্ড উপাদানসমূহ বিকশিত কৰিবলৈ প্ৰতিশ্ৰুতিবদ্ধ, আৰু আপুনি অংশগ্ৰহণ কৰিবলৈ আদৰণি জনোৱা হৈছে।