language: ٻولي
os: سسٽم
about: بابت
jsInfo: JavaScript هڪ اسڪرپٽنگ ٻولي آهي جيڪا وڏي پيماني تي ڪلائنٽ سائڊ ويب ڊولپمينٽ ۾ استعمال ٿيندي آهي.
rsInfo: مورچا هڪ سسٽم پروگرامنگ ٻولي آهي جيڪو حفاظت، رفتار، ۽ اتفاق تي ڌيان ڏئي ٿو.
pyInfo: پٿون هڪ اعتراض تي مبني، تفسير ڪيل ڪمپيوٽر پروگرامنگ ٻولي آهي.
macInfo: macOS ھڪڙو يونڪس تي ٻڌل گرافڪ آپريٽنگ سسٽم آھي جيڪو ايپل پاران تيار ڪيو ويو آھي.
winInfo: ونڊوز هڪ وڏي پيماني تي استعمال ٿيل ذاتي ڪمپيوٽر آپريٽنگ سسٽم آهي جيڪو Microsoft ڪارپوريشن پاران تيار ڪيو ويو آهي.
aboutInfo: اسان اعليٰ معيار جي اوپن سورس فرنٽ-اينڊ اجزاء کي ترقي ڪرڻ لاءِ پرعزم آهيون، ۽ توهان کي حصو وٺڻ ۾ ڀليڪار آهي.