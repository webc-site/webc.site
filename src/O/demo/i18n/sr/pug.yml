title1: Екстремни минимализам
desc1: |-
  ВебЦ.сите се фокусира на изградњу чистих, лаганих фронт-енд компоненти без оптерећења током рада.
  Ослањајући се на модерне јс и цсс карактеристике, он представља бесконачне могућности са префињеним кодом.

title2: Нова парадигма за развој фронт-енда у ери вештачке интелигенције
desc2: |-
  У потпуности прихватите вештачку интелигенцију, развојни ток дизајниран за аутоматско кодирање.
  Правила кода се временом усавршавају, омогућавајући моделу великог језика да смањи трошкове и повећа ефикасност за вас.

title3: Елегантне визуелне норме
desc3: |-
  Визуелни естетски дизајн укључује изузетне ефекте микро покрета и текстуру мат стакла.
  Бела основа, једноставна и чиста, помаже вам да креирате искуство интеракције са апликацијом високог квалитета.