title1: Muturreko minimalismoa
desc1: |-
  WebC.site-k front-end osagai garbiak eta arinak eraikitzen ditu exekuzio-zamarik gabe.
  Js eta css ezaugarri modernoetan oinarrituz, aukera infinituak aurkezten ditu kode finduarekin.

title2: AI garaian front-end garapenerako paradigma berri bat
desc2: |-
  Besarkatu guztiz adimen artifiziala, kodeketa automatizaturako diseinatutako garapen-fluxua.
  Kode-arauak denborarekin findu egiten dira, hizkuntza-eredu handiak kostuak murrizteko eta zuretzako eraginkortasuna areagotzeko aukera emanez.

title3: Arau bisual dotoreak
desc3: |-
  Diseinu estetiko bisualak mikro-mugimendu efektu bikainak eta beira izoztuaren ehundura ditu.
  Oinarri zuria, sinplea eta hutsa, kalitate handiko aplikazioen interakzio esperientzia sortzen laguntzen dizu.