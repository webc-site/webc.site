title1: Extrem minimalism
desc1: |-
  WebC.site fokuserar på att bygga rena, lätta front-end-komponenter utan körtidsbörda.
  Med hjälp av moderna js- och css-funktioner erbjuder den oändliga möjligheter med förfinad kod.

title2: Ett nytt paradigm för frontend-utveckling i AI-eran
desc2: |-
  Omfamna artificiell intelligens, ett utvecklingsflöde designat för automatiserad kodning.
  Kodreglerna förfinas över tiden, vilket gör att den stora språkmodellen kan minska kostnaderna och öka effektiviteten för dig.

title3: Eleganta visuella normer
desc3: |-
  Den visuella estetiska designen innehåller utsökta mikrorörelseeffekter och frostat glasstruktur.
  Vit bas, enkel och ren, hjälper dig att skapa en högkvalitativ applikationsinteraktionsupplevelse.