title1: Екстремен минимализам
desc1: |-
  WebC.site се фокусира на изградба на чисти, лесни компоненти од предниот дел, без оптоварување на времето на работа.
  Потпирајќи се на модерните карактеристики js и css, тој нуди бесконечни можности со рафиниран код.

title2: Нова парадигма за развој на предниот дел во ерата на вештачката интелигенција
desc2: |-
  Целосно прифатете ја вештачката интелигенција, развојен тек дизајниран за автоматско кодирање.
  Правилата за кодови се усовршуваат со текот на времето, овозможувајќи му на големиот јазичен модел да ги намали трошоците и да ја зголеми ефикасноста за вас.

title3: Елегантни визуелни норми
desc3: |-
  Визуелниот естетски дизајн вклучува извонредни микро-движечки ефекти и текстура на матирано стакло.
  Бела основа, едноставна и чиста, што ви помага да создадете висококвалитетно искуство за интеракција со апликации.