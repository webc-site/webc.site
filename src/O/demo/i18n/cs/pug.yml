title1: Extrémní minimalismus
desc1: |-
  WebC.site se zaměřuje na vytváření čistých, lehkých front-end komponent bez zátěže za běhu.
  Spoléhá na moderní funkce js a css a představuje nekonečné možnosti s rafinovaným kódem.

title2: Nové paradigma pro vývoj front-endu v éře AI
desc2: |-
  Plně si osvojte umělou inteligenci, vývojový tok určený pro automatizované kódování.
  Pravidla kódu se postupem času zpřesňují, což umožňuje velkému jazykovému modelu snížit náklady a zvýšit efektivitu.

title3: Elegantní vizuální normy
desc3: |-
  Vizuální estetický design zahrnuje vynikající efekty mikropohybu a texturu matného skla.
  Bílý základ, jednoduchý a čistý, který vám pomůže vytvořit vysoce kvalitní zážitek z interakce s aplikacemi.