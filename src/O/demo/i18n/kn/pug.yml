title1: ಅತ್ಯಂತ ಕನಿಷ್ಠೀಯತಾವಾದ
desc1: |-
  WebC.site ಯಾವುದೇ ರನ್‌ಟೈಮ್ ಹೊರೆಯಿಲ್ಲದೆ ಶುದ್ಧ, ಹಗುರವಾದ ಮುಂಭಾಗದ ಭಾಗಗಳನ್ನು ನಿರ್ಮಿಸುವುದರ ಮೇಲೆ ಕೇಂದ್ರೀಕರಿಸುತ್ತದೆ.
  ಆಧುನಿಕ js ಮತ್ತು css ವೈಶಿಷ್ಟ್ಯಗಳನ್ನು ಅವಲಂಬಿಸಿ, ಇದು ಸಂಸ್ಕರಿಸಿದ ಕೋಡ್‌ನೊಂದಿಗೆ ಅನಂತ ಸಾಧ್ಯತೆಗಳನ್ನು ಒದಗಿಸುತ್ತದೆ.

title2: AI ಯುಗದಲ್ಲಿ ಮುಂಭಾಗದ ಅಭಿವೃದ್ಧಿಗೆ ಹೊಸ ಮಾದರಿ
desc2: |-
  ಕೃತಕ ಬುದ್ಧಿಮತ್ತೆಯನ್ನು ಸಂಪೂರ್ಣವಾಗಿ ಅಳವಡಿಸಿಕೊಳ್ಳಿ, ಸ್ವಯಂಚಾಲಿತ ಕೋಡಿಂಗ್‌ಗಾಗಿ ವಿನ್ಯಾಸಗೊಳಿಸಲಾದ ಅಭಿವೃದ್ಧಿ ಹರಿವು.
  ಕೋಡ್ ನಿಯಮಗಳನ್ನು ಕಾಲಾನಂತರದಲ್ಲಿ ಸಂಸ್ಕರಿಸಲಾಗುತ್ತದೆ, ದೊಡ್ಡ ಭಾಷಾ ಮಾದರಿಯು ವೆಚ್ಚವನ್ನು ಕಡಿಮೆ ಮಾಡಲು ಮತ್ತು ನಿಮಗಾಗಿ ದಕ್ಷತೆಯನ್ನು ಹೆಚ್ಚಿಸಲು ಅನುವು ಮಾಡಿಕೊಡುತ್ತದೆ.

title3: ಸೊಗಸಾದ ದೃಶ್ಯ ರೂಢಿಗಳು
desc3: |-
  ದೃಶ್ಯ ಸೌಂದರ್ಯದ ವಿನ್ಯಾಸವು ಸೊಗಸಾದ ಸೂಕ್ಷ್ಮ-ಚಲನೆಯ ಪರಿಣಾಮಗಳನ್ನು ಮತ್ತು ಫ್ರಾಸ್ಟೆಡ್ ಗ್ಲಾಸ್ ವಿನ್ಯಾಸವನ್ನು ಒಳಗೊಂಡಿದೆ.
  ಬಿಳಿ ಬೇಸ್, ಸರಳ ಮತ್ತು ಶುದ್ಧ, ಉತ್ತಮ ಗುಣಮಟ್ಟದ ಅಪ್ಲಿಕೇಶನ್ ಪರಸ್ಪರ ಅನುಭವವನ್ನು ರಚಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.