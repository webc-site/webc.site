title1: අන්ත අවමවාදය
desc1: |-
  WebC.site අවධානය යොමු කරන්නේ ධාවන කාල බරක් නොමැතිව පිරිසිදු, සැහැල්ලු ඉදිරිපස කොටස් ගොඩනැගීමටය.
  නවීන js සහ css විශේෂාංග මත රඳා පැවතීම, එය පිරිපහදු කළ කේතය සමඟ අසීමිත හැකියාවන් ඉදිරිපත් කරයි.

title2: AI යුගයේ ඉදිරිපස සංවර්ධනය සඳහා නව ආදර්ශයක්
desc2: |-
  ස්වයංක්‍රීය කේතීකරණය සඳහා නිර්මාණය කර ඇති සංවර්ධන ප්‍රවාහයක් වන කෘතිම බුද්ධිය සම්පූර්ණයෙන්ම වැලඳගන්න.
  කේත රීති කාලයත් සමඟ පිරිපහදු කර ඇති අතර, විශාල භාෂා ආකෘතිය ඔබට වියදම් අඩු කිරීමට සහ කාර්යක්ෂමතාව වැඩි කිරීමට ඉඩ සලසයි.

title3: අලංකාර දෘශ්ය සම්මතයන්
desc3: |-
  දෘෂ්‍ය සෞන්දර්‍ය නිර්මාණයට විශිෂ්ට ක්ෂුද්‍ර චලන බලපෑම් සහ ශීත කළ වීදුරු වයනය ඇතුළත් වේ.
  සුදු පදනම, සරල සහ පිරිසිදු, ඔබට උසස් තත්ත්වයේ යෙදුම් අන්තර්ක්‍රියා අත්දැකීමක් නිර්මාණය කිරීමට උපකාරී වේ.