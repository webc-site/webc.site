title1: انتهائي minimalism
desc1: |-
  WebC.site خالص، ھلڪو وزن فرنٽ-اينڊ اجزاء جي تعمير تي ڌيان ڏئي ٿو بغير رن ٽائم جي بوجھ سان.
  جديد js ۽ css خاصيتن تي ڀروسو ڪندي، اهو بهتر ڪوڊ سان لامحدود امڪان پيش ڪري ٿو.

title2: AI دور ۾ فرنٽ اينڊ ڊولپمينٽ لاءِ هڪ نئون نمونو
desc2: |-
  مڪمل طور تي مصنوعي ذهانت کي قبول ڪريو، هڪ ترقي وارو وهڪرو جيڪو خودڪار ڪوڊنگ لاءِ ٺهيل آهي.
  ڪوڊ جا ضابطا وقت سان گڏ سڌاريا ويندا آهن، وڏي ٻوليءَ جي ماڊل کي توهان جي خرچن کي گهٽائڻ ۽ ڪارڪردگي وڌائڻ جي اجازت ڏئي ٿي.

title3: خوبصورت بصري معيار
desc3: |-
  بصري جمالياتي ڊيزائن ۾ شاندار مائڪرو موشن اثرات ۽ ڀريل شيشي جي بناوت شامل آهن.
  اڇو بنياد، سادو ۽ خالص، توهان کي اعلي معيار جي ايپليڪيشن رابطي جو تجربو ٺاهڻ ۾ مدد ڪندي.