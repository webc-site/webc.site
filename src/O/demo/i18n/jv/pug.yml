title1: Minimalis ekstrem
desc1: |-
  WebC.site fokus ing mbangun komponen ngarep sing murni lan entheng tanpa beban wektu.
  Ngandelake fitur js lan css modern, menehi kemungkinan tanpa wates kanthi kode sing apik.

title2: Paradigma anyar kanggo pangembangan ngarep ing jaman AI
desc2: |-
  Lengkapi intelijen buatan, aliran pangembangan sing dirancang kanggo coding otomatis.
  Aturan kode ditapis liwat wektu, ngidini model basa gedhe kanggo ngurangi biaya lan nambah efficiency kanggo sampeyan.

title3: Norma visual sing elegan
desc3: |-
  Desain estetika visual nggabungake efek gerakan mikro sing apik banget lan tekstur kaca beku.
  Dasar putih, prasaja lan murni, mbantu sampeyan nggawe pengalaman interaksi aplikasi sing berkualitas tinggi.