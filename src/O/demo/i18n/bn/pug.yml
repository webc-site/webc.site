title1: চরম minimalism
desc1: |-
  WebC.site বিশুদ্ধ, হালকা ওজনের ফ্রন্ট-এন্ড উপাদান নির্মাণের উপর ফোকাস করে যাতে রানটাইম বোঝা না যায়।
  আধুনিক জেএস এবং সিএসএস বৈশিষ্ট্যের উপর নির্ভর করে, এটি পরিমার্জিত কোড সহ অসীম সম্ভাবনা উপস্থাপন করে।

title2: এআই যুগে ফ্রন্ট-এন্ড বিকাশের জন্য একটি নতুন দৃষ্টান্ত
desc2: |-
  সম্পূর্ণরূপে কৃত্রিম বুদ্ধিমত্তা গ্রহণ করুন, একটি উন্নয়ন প্রবাহ যা স্বয়ংক্রিয় কোডিংয়ের জন্য ডিজাইন করা হয়েছে।
  কোড নিয়মগুলি সময়ের সাথে পরিমার্জিত হয়, বড় ভাষা মডেলকে আপনার জন্য খরচ কমাতে এবং দক্ষতা বাড়াতে অনুমতি দেয়।

title3: মার্জিত চাক্ষুষ নিয়ম
desc3: |-
  ভিজ্যুয়াল নান্দনিক ডিজাইনটি সূক্ষ্ম মাইক্রো-মোশন ইফেক্ট এবং ফ্রস্টেড গ্লাস টেক্সচারকে অন্তর্ভুক্ত করে।
  সাদা বেস, সহজ এবং খাঁটি, আপনাকে একটি উচ্চ-মানের অ্যাপ্লিকেশন ইন্টারঅ্যাকশন অভিজ্ঞতা তৈরি করতে সহায়তা করে।