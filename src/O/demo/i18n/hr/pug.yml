title1: Ekstremni minimalizam
desc1: |-
  WebC.site fokusiran je na izgradnju čistih, laganih front-end komponenti bez opterećenja vremena izvođenja.
  Oslanjajući se na moderne js i css značajke, pruža beskonačne mogućnosti s rafiniranim kodom.

title2: Nova paradigma za front-end razvoj u eri umjetne inteligencije
desc2: |-
  U potpunosti prihvatite umjetnu inteligenciju, razvojni tijek dizajniran za automatizirano kodiranje.
  Pravila koda s vremenom se usavršavaju, omogućujući velikom jezičnom modelu da smanji troškove i poveća učinkovitost za vas.

title3: Elegantne vizualne norme
desc3: |-
  Vizualni estetski dizajn uključuje izvrsne efekte mikropokreta i teksturu mat stakla.
  Bijela baza, jednostavna i čista, pomaže vam stvoriti visokokvalitetno iskustvo interakcije s aplikacijom.