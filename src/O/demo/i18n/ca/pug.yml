title1: Minimalisme extrem
desc1: |-
  WebC.site se centra a construir components frontals purs i lleugers sense cap càrrega de temps d'execució.
  Basant-se en les funcions js i css modernes, presenta infinites possibilitats amb codi refinat.

title2: Un nou paradigma per al desenvolupament front-end a l'era de la IA
desc2: |-
  Abraça completament la intel·ligència artificial, un flux de desenvolupament dissenyat per a la codificació automatitzada.
  Les regles del codi es perfeccionen amb el pas del temps, cosa que permet que el gran model d'idioma redueixi costos i augmenti l'eficiència.

title3: Normes visuals elegants
desc3: |-
  El disseny estètic visual incorpora efectes de micro-moviment exquisits i textura de vidre esmerilat.
  Base blanca, senzilla i pura, que t'ajuda a crear una experiència d'interacció amb aplicacions d'alta qualitat.