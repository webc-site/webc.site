title1: 極端なミニマリズム
desc1: |-
  WebC.site は、実行時の負担のない、純粋で軽量なフロントエンド コンポーネントの構築に重点を置いています。
  最新の js および css 機能に依存し、洗練されたコードで無限の可能性を提供します。

title2: AI時代のフロントエンド開発の新たなパラダイム
desc2: |-
  自動コーディング用に設計された開発フローである人工知能を完全に採用します。
  コード ルールは時間の経過とともに洗練され、大規模な言語モデルによってコストが削減され、効率が向上します。

title3: エレガントな視覚基準
desc3: |-
  絶妙なマイクロモーション効果と曇りガラスの質感を取り入れた視覚的な美的デザイン。
  シンプルで純粋なホワイトベースで、高品質のアプリケーション対話エクスペリエンスの作成に役立ちます。