title1: Minimalisme ekstrim
desc1: |-
  WebC.site berfokus pada pembuatan komponen front-end yang murni dan ringan tanpa beban waktu proses.
  Mengandalkan fitur js dan css modern, ini menghadirkan kemungkinan tak terbatas dengan kode yang disempurnakan.

title2: Paradigma baru pengembangan front-end di era AI
desc2: |-
  Merangkul sepenuhnya kecerdasan buatan, alur pengembangan yang dirancang untuk pengkodean otomatis.
  Aturan kode disempurnakan seiring waktu, memungkinkan model bahasa besar mengurangi biaya dan meningkatkan efisiensi untuk Anda.

title3: Norma visual yang elegan
desc3: |-
  Desain estetika visual menggabungkan efek gerakan mikro yang indah dan tekstur kaca buram.
  Basis putih, sederhana dan murni, membantu Anda menciptakan pengalaman interaksi aplikasi berkualitas tinggi.