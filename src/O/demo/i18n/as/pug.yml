title1: চৰম নূন্যতমতাবাদ
desc1: |-
  WebC.site এ কোনো চলনসময়ৰ বোজা নোহোৱাকৈ বিশুদ্ধ, লঘু ফ্ৰন্ট-এণ্ড উপাদান নিৰ্মাণ কৰাত মনোনিৱেশ কৰে।
  আধুনিক js আৰু css বৈশিষ্ট্যৰ ওপৰত নিৰ্ভৰ কৰি, ই পৰিশোধিত ক'ডৰ সৈতে অসীম সম্ভাৱনা উপস্থাপন কৰে।

title2: এআই যুগত ফ্ৰন্ট-এণ্ড ডেভেলপমেণ্টৰ বাবে এক নতুন পেৰাডাইম
desc2: |-
  কৃত্ৰিম বুদ্ধিমত্তাক সম্পূৰ্ণৰূপে আকোৱালি লওক, যিটো স্বয়ংক্ৰিয় ক’ডিঙৰ বাবে ডিজাইন কৰা এটা উন্নয়ন প্ৰবাহ।
  ক'ড নিয়মসমূহ সময়ৰ লগে লগে পৰিশোধন কৰা হয়, যাৰ ফলত বৃহৎ ভাষাৰ আৰ্হিটোৱে খৰচ হ্ৰাস কৰে আৰু আপোনাৰ বাবে দক্ষতা বৃদ্ধি কৰে।

title3: মাৰ্জিত দৃশ্যমান নীতি
desc3: |-
  দৃশ্যমান নান্দনিক ডিজাইনত সুন্দৰ মাইক্ৰ’-ম’চন ইফেক্ট আৰু ফ্ৰষ্টেড গ্লাছ টেক্সচাৰ অন্তৰ্ভুক্ত কৰা হৈছে।
  বগা ভিত্তি, সহজ আৰু বিশুদ্ধ, আপোনাক এটা উচ্চ-মানৰ এপ্লিকেচন পাৰস্পৰিক ক্ৰিয়াৰ অভিজ্ঞতা সৃষ্টি কৰাত সহায় কৰে।