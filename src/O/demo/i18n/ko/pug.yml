title1: 극도의 미니멀리즘
desc1: |-
  WebC.site는 런타임 부담 없이 순수하고 가벼운 프런트 엔드 구성 요소를 구축하는 데 중점을 둡니다.
  최신 js 및 css 기능을 기반으로 세련된 코드로 무한한 가능성을 제시합니다.

title2: AI시대 프론트엔드 개발의 새로운 패러다임
desc2: |-
  자동화된 코딩을 위해 설계된 개발 흐름인 인공 지능을 완전히 수용합니다.
  코드 규칙은 시간이 지남에 따라 개선되므로 대규모 언어 모델을 통해 비용을 절감하고 효율성을 높일 수 있습니다.

title3: 우아한 시각적 규범
desc3: |-
  시각적 미적 디자인은 절묘한 마이크로 모션 효과와 반투명 유리 질감을 통합합니다.
  단순하고 순수한 흰색 베이스는 고품질 애플리케이션 상호 작용 경험을 만드는 데 도움이 됩니다.