title1: انتہائی minimalism
desc1: |-
  WebC.site بغیر کسی رن ٹائم بوجھ کے خالص، ہلکے پھلکے فرنٹ اینڈ اجزاء کی تعمیر پر توجہ مرکوز کرتی ہے۔
  جدید js اور css خصوصیات پر انحصار کرتے ہوئے، یہ بہتر کوڈ کے ساتھ لامحدود امکانات پیش کرتا ہے۔

title2: اے آئی دور میں فرنٹ اینڈ ڈیولپمنٹ کے لیے ایک نیا نمونہ
desc2: |-
  مصنوعی ذہانت کو مکمل طور پر قبول کریں، ایک ترقی کا بہاؤ جو خودکار کوڈنگ کے لیے ڈیزائن کیا گیا ہے۔
  کوڈ کے قوانین کو وقت کے ساتھ ساتھ بہتر کیا جاتا ہے، جس سے زبان کے بڑے ماڈل کو آپ کے لیے لاگت کم کرنے اور کارکردگی بڑھانے کی اجازت ملتی ہے۔

title3: خوبصورت بصری معیارات
desc3: |-
  بصری جمالیاتی ڈیزائن میں شاندار مائیکرو موشن اثرات اور فراسٹڈ شیشے کی ساخت شامل ہے۔
  وائٹ بیس، سادہ اور خالص، آپ کو اعلی معیار کی ایپلی کیشن کے تعامل کا تجربہ بنانے میں مدد کرتا ہے۔