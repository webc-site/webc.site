title1: Uiterste minimalisme
desc1: |-
  WebC.site fokus op die bou van suiwer, liggewig front-end komponente met geen looptyd las.
  Deur op moderne js- en css-kenmerke staat te maak, bied dit oneindige moontlikhede met verfynde kode.

title2: 'n Nuwe paradigma vir front-end-ontwikkeling in die KI-era
desc2: |-
  Omhels kunsmatige intelligensie ten volle, 'n ontwikkelingsvloei wat ontwerp is vir outomatiese kodering.
  Kodereëls word mettertyd verfyn, wat die groot taalmodel in staat stel om koste te verminder en doeltreffendheid vir jou te verhoog.

title3: Elegante visuele norme
desc3: |-
  Die visuele estetiese ontwerp sluit pragtige mikro-beweging-effekte en matglastekstuur in.
  Wit basis, eenvoudig en suiwer, wat jou help om 'n toepassingsinteraksie-ervaring van hoë gehalte te skep.