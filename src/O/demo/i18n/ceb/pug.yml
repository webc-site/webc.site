title1: Grabe nga minimalism
desc1: |-
  Ang WebC.site nagtutok sa paghimo og lunsay, gaan nga mga sangkap sa atubangan nga wala’y palas-anon sa runtime.
  Nagsalig sa modernong js ug css nga mga bahin, kini nagpresentar sa walay kinutuban nga mga posibilidad nga adunay dalisay nga code.

title2: Usa ka bag-ong paradigm alang sa pag-uswag sa unahan sa panahon sa AI
desc2: |-
  Hingpit nga dawaton ang artificial intelligence, usa ka development flow nga gidisenyo alang sa automated coding.
  Ang mga lagda sa code gidalisay sa paglabay sa panahon, nga nagtugot sa dako nga modelo sa pinulongan nga makunhuran ang mga gasto ug madugangan ang pagkaepisyente alang kanimo.

title3: Elegant nga biswal nga mga lagda
desc3: |-
  Ang biswal nga aesthetic nga disenyo naglakip sa nindot nga micro-motion nga mga epekto ug frosted glass texture.
  Puti nga base, yano ug putli, nga nagtabang kanimo sa paghimo sa usa ka taas nga kalidad nga kasinatian sa interaksyon sa aplikasyon.