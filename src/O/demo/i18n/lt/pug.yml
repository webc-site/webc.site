title1: Ekstremalus minimalizmas
desc1: |-
  WebC.site sutelkia dėmesį į grynų, lengvų priekinių komponentų kūrimą be vykdymo naštos.
  Remdamasis šiuolaikinėmis js ir css funkcijomis, jis suteikia begalines galimybes su patobulintu kodu.

title2: Nauja AI eros front-end kūrimo paradigma
desc2: |-
  Visiškai pritaikykite dirbtinį intelektą, kūrimo srautą, skirtą automatizuotam kodavimui.
  Kodo taisyklės laikui bėgant tobulėja, todėl didelės kalbos modelis leidžia sumažinti išlaidas ir padidinti efektyvumą.

title3: Elegantiškos vizualinės normos
desc3: |-
  Vaizdinis estetinis dizainas apima išskirtinius mikrojudesio efektus ir matinio stiklo tekstūrą.
  Baltas pagrindas, paprastas ir grynas, padedantis sukurti aukštos kokybės programų sąveikos patirtį.